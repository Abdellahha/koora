<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Other Channels Player</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151c;
    --panel2:#181c25;
    --accent:#3b82ff;
    --accent2:#3bffd0;
    --text:#eef0f4;
    --muted:#8a90a0;
    --border:rgba(255,255,255,0.07);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:radial-gradient(circle at 20% -10%, #1a1f2b 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
  }
  .app{ display:flex; height:100vh; width:100vw; }

  .sidebar{
    width:320px;
    min-width:260px;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    z-index:10;
  }
  .sidebar-header{
    padding:24px 20px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid var(--border);
  }
  .back-link{
    color:var(--muted);
    text-decoration:none;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 18px;
    border-bottom:1px solid var(--border);
    transition:color .2s ease;
  }
  .back-link:hover{ color:var(--text); }
  .logo{
    width:38px;
    height:38px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:14px;
    box-shadow:0 4px 14px rgba(59,130,255,0.35);
    flex-shrink:0;
  }
  .brand h1{ font-size:16px; margin:0; letter-spacing:.3px; }
  .brand span{ font-size:12px; color:var(--muted); }

  .playlist{
    flex:1;
    overflow-y:auto;
    padding:14px 12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .playlist::-webkit-scrollbar{ width:6px; }
  .playlist::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:6px; }

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--muted);
    padding:30px;
    font-size:13px;
  }
  .empty-state .ico{ font-size:34px; margin-bottom:10px; }

  .channel{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(255,255,255,0.02);
    border:1px solid transparent;
    cursor:pointer;
    transition:background .25s ease, transform .2s ease, border-color .25s ease;
    position:relative;
    overflow:hidden;
  }
  .channel:hover{ background:rgba(255,255,255,0.05); transform:translateX(2px); }
  .channel.active{
    background:linear-gradient(90deg, rgba(59,130,255,0.18), rgba(59,255,208,0.06));
    border-color:rgba(59,130,255,0.4);
  }
  .channel.active::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:4px;
    background:linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius:0 4px 4px 0;
  }
  .ch-icon{
    width:42px;height:42px;
    border-radius:10px;
    background:#1f2330;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:13px;
    color:#cfd3dd;
    flex-shrink:0;
    transition:transform .3s ease;
  }
  .channel.active .ch-icon{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#06121f;
    transform:scale(1.05);
  }
  .ch-info{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .ch-name{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ch-sub{ font-size:11px; color:var(--muted); }
  .live-dot{
    margin-left:auto;
    width:8px;height:8px;
    border-radius:50%;
    background:#3ddc84;
    box-shadow:0 0 8px #3ddc84;
    opacity:0;
    transition:opacity .25s ease;
    flex-shrink:0;
  }
  .channel.active .live-dot{ opacity:1; animation:pulse 1.6s infinite; }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,.6);}
    70%{box-shadow:0 0 0 8px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }

  .main{ flex:1; display:flex; flex-direction:column; position:relative; }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 26px;
    border-bottom:1px solid var(--border);
    background:rgba(18,21,28,0.6);
    backdrop-filter:blur(8px);
  }
  .now-playing{ display:flex; align-items:center; gap:12px; }
  .now-playing h2{ margin:0; font-size:18px; font-weight:700; }
  .badge{
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    background:rgba(59,130,255,0.15);
    color:var(--accent);
    border:1px solid rgba(59,130,255,0.3);
    font-weight:600;
    letter-spacing:.5px;
  }
  .menu-btn{
    display:none;
    width:38px;height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.04);
    color:var(--text);
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:18px;
  }
  .controls{ display:flex; gap:10px; }
  .icon-btn{
    width:38px;height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.04);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .2s ease, transform .2s ease;
    font-size:15px;
  }
  .icon-btn:hover{ background:rgba(255,255,255,0.1); transform:translateY(-1px); }

  .player-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:26px;
    position:relative;
  }
  .player-frame{
    width:100%;
    height:100%;
    max-width:1400px;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    box-shadow:0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);
    position:relative;
    opacity:0;
    transform:scale(.985);
    transition:opacity .45s ease, transform .45s ease;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .player-frame.show{ opacity:1; transform:scale(1); }
  .player-frame iframe{ width:100%; height:100%; border:0; display:block; }
  .placeholder-msg{
    text-align:center;
    color:var(--muted);
    padding:40px;
  }
  .placeholder-msg .ico{ font-size:46px; margin-bottom:14px; }

  .loading-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#05060a;
    transition:opacity .35s ease;
    z-index:5;
  }
  .loading-overlay.hidden{ opacity:0; pointer-events:none; }
  .spinner{
    width:46px;height:46px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9; }

  /* ── Matchup Selector ── */
  .matchup-bar{
    padding:18px 26px 0;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .matchup-label{
    font-size:11px;
    letter-spacing:.8px;
    color:var(--muted);
    text-transform:uppercase;
    font-weight:600;
  }
  .matchup-row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .team-selector{
    flex:1;
    position:relative;
  }
  .team-selector label{
    display:block;
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.6px;
    margin-bottom:5px;
    font-weight:600;
  }
  .team-btn{
    width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 16px;
    color:var(--text);
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    transition:background .2s, border-color .2s;
    text-align:left;
  }
  .team-btn:hover{ background:rgba(255,255,255,0.08); border-color:rgba(59,130,255,0.4); }
  .team-btn .flag{ font-size:20px; flex-shrink:0; }
  .team-btn .name{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team-btn .arrow{ color:var(--muted); font-size:11px; flex-shrink:0; }

  .vs-badge{
    font-size:13px;
    font-weight:800;
    color:var(--muted);
    padding:8px 6px 0;
    flex-shrink:0;
    letter-spacing:1px;
  }
  .watch-btn{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    border:none;
    border-radius:12px;
    padding:10px 22px;
    color:#06121f;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .2s, transform .2s;
    white-space:nowrap;
    align-self:flex-end;
    margin-bottom:0;
  }
  .watch-btn:hover{ opacity:.88; transform:translateY(-1px); }
  .watch-btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }

  /* Dropdown */
  .team-dropdown{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    width:100%;
    min-width:220px;
    background:#1a1e2b;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    z-index:100;
    overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.6);
    display:none;
    flex-direction:column;
  }
  .team-dropdown.open{ display:flex; }
  .dd-search{
    padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,0.07);
    flex-shrink:0;
  }
  .dd-search input{
    width:100%;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;
    padding:7px 12px;
    color:var(--text);
    font-size:13px;
    outline:none;
  }
  .dd-search input::placeholder{ color:var(--muted); }
  .dd-list{
    overflow-y:auto;
    max-height:280px;
    padding:6px;
  }
  .dd-list::-webkit-scrollbar{ width:5px; }
  .dd-list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.1); border-radius:5px; }
  .dd-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 12px;
    border-radius:9px;
    cursor:pointer;
    font-size:13px;
    transition:background .15s;
  }
  .dd-item:hover{ background:rgba(255,255,255,0.07); }
  .dd-item.selected{ background:rgba(59,130,255,0.15); color:var(--accent); }
  .dd-item .flag{ font-size:18px; }

  .matchup-divider{
    height:1px;
    background:var(--border);
    margin:14px 26px 0;
  }

  @media (max-width: 860px){
    .matchup-bar{ padding:14px 14px 0; }
    .matchup-row{ flex-wrap:wrap; gap:10px; }
    .matchup-divider{ margin:14px 14px 0; }
    .watch-btn{ width:100%; text-align:center; justify-content:center; }
  }

  @media (max-width: 860px){
    .sidebar{ position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%); box-shadow:10px 0 40px rgba(0,0,0,.5); }
    .sidebar.open{ transform:translateX(0); }
    .menu-btn{ display:flex; }
    .overlay.show{ display:block; }
    .player-wrap{ padding:14px; }
    .player-frame{ border-radius:12px; }
    .topbar{ padding:14px 16px; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="back-link">← Back to Home</a>
    <div class="sidebar-header">
      <div class="logo">OT</div>
      <div class="brand">
        <h1>Other Channels</h1>
        <span>Live Channel Playlist</span>
      </div>
    </div>
    <div class="playlist" id="playlist"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="now-playing">
          <h2 id="channelTitle">No channel loaded</h2>
          <span class="badge" id="statusBadge">EMPTY</span>
        </div>
      </div>
      <div class="controls">
        <button class="icon-btn" id="reloadBtn" title="Reload">⟳</button>
        <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <!-- Matchup Selector -->
    <div class="matchup-bar">
      <div class="matchup-label">🏆 World Cup 2026 — Pick a Match</div>
      <div class="matchup-row">
        <div class="team-selector" id="selectorA">
          <label>Home Team</label>
          <button class="team-btn" id="btnA" onclick="toggleDropdown('A')">
            <span class="flag" id="flagA">🌍</span>
            <span class="name" id="nameA">Select team…</span>
            <span class="arrow">▾</span>
          </button>
          <div class="team-dropdown" id="dropdownA">
            <div class="dd-search"><input type="text" placeholder="Search…" oninput="filterDD('A',this.value)" id="searchA"></div>
            <div class="dd-list" id="listA"></div>
          </div>
        </div>

        <div class="vs-badge">VS</div>

        <div class="team-selector" id="selectorB">
          <label>Away Team</label>
          <button class="team-btn" id="btnB" onclick="toggleDropdown('B')">
            <span class="flag" id="flagB">🌍</span>
            <span class="name" id="nameB">Select team…</span>
            <span class="arrow">▾</span>
          </button>
          <div class="team-dropdown" id="dropdownB">
            <div class="dd-search"><input type="text" placeholder="Search…" oninput="filterDD('B',this.value)" id="searchB"></div>
            <div class="dd-list" id="listB"></div>
          </div>
        </div>

        <button class="watch-btn" id="watchBtn" onclick="loadMatchup()" disabled>▶ Watch</button>
      </div>
    </div>
    <div class="matchup-divider"></div>

    <div class="player-wrap">
      <div class="player-frame" id="playerFrame">
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner"></div>
        </div>
        <div class="placeholder-msg" id="placeholderMsg">
          <div class="ico">📺</div>
          <div>Send me the streaming links for this section<br>and I'll wire them in here.</div>
        </div>
        <iframe id="videoIframe" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-forms" referrerpolicy="no-referrer" style="display:none;"></iframe>
      </div>
    </div>
  </main>

</div>

<script>
  window.open = function(){ console.warn('Popup blocked'); return null; };

  // ── All 48 FIFA World Cup 2026 Teams ──
  const WC_TEAMS = [
    // Hosts
    { name:"Canada",           slug:"canada",            flag:"🇨🇦" },
    { name:"Mexico",           slug:"mexico",            flag:"🇲🇽" },

    { name:"Argentina",        slug:"argentina",         flag:"🇦🇷" },

    { name:"Spain",            slug:"spain",             flag:"🇪🇸" },

    { name:"Czechia",          slug:"czechia",           flag:"🇨🇿" },

    { name:"Morocco",          slug:"morocco",           flag:"🇲🇦" },

    // AFC
    { name:"Japan",            slug:"japan",             flag:"🇯🇵" },

    { name:"Australia",        slug:"australia",         flag:"🇦🇺" },
    { name:"Iran",             slug:"iran",              flag:"🇮🇷" },
    { name:"Saudi Arabia",     slug:"saudi-arabia",      flag:"🇸🇦" },
    { name:"Qatar",            slug:"qatar",             flag:"🇶🇦" },
    { name:"Iraq",             slug:"iraq",              flag:"🇮🇶" },
    { name:"Jordan",           slug:"jordan",            flag:"🇯🇴" },
    { name:"Uzbekistan",       slug:"uzbekistan",        flag:"🇺🇿" },
    // OFC
    { name:"New Zealand",      slug:"new-zealand",       flag:"🇳🇿" },
  ].sort((a,b)=>a.name.localeCompare(b.name));

  const BASE_URL = "https://embed.st/embed/admin/ppv-";

  let selectedA = null;
  let selectedB = null;

  // ── Playlist (legacy) ──
  const channels = [];
  const playlistEl = document.getElementById('playlist');
  const iframe = document.getElementById('videoIframe');
  const playerFrame = document.getElementById('playerFrame');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const placeholderMsg = document.getElementById('placeholderMsg');
  const channelTitle = document.getElementById('channelTitle');
  const statusBadge = document.getElementById('statusBadge');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  let activeIndex = -1;

  function renderPlaylist(){
    playlistEl.innerHTML='';
    if(channels.length===0){
      const empty=document.createElement('div');
      empty.className='empty-state';
      empty.innerHTML=`<div class="ico">🏆</div>Pick a match<br>above to start watching.`;
      playlistEl.appendChild(empty);
      return;
    }
    channels.forEach((ch,i)=>{
      const div=document.createElement('div');
      div.className='channel'+(i===activeIndex?' active':'');
      div.innerHTML=`<div class="ch-icon">${ch.code}</div><div class="ch-info"><div class="ch-name">${ch.name}</div><div class="ch-sub">${ch.sub}</div></div><div class="live-dot"></div>`;
      div.addEventListener('click',()=>selectChannel(i));
      playlistEl.appendChild(div);
    });
  }

  function selectChannel(i){
    activeIndex=i;
    renderPlaylist();
    loadChannel(i);
    if(window.innerWidth<=860) closeSidebar();
  }

  function loadChannel(i){
    const ch=channels[i];
    if(!ch) return;
    channelTitle.textContent=ch.name;
    statusBadge.textContent='LIVE';
    placeholderMsg.style.display='none';
    iframe.style.display='block';
    loadingOverlay.classList.remove('hidden');
    playerFrame.classList.remove('show');
    iframe.src='about:blank';
    setTimeout(()=>{ iframe.src=ch.url; },150);
  }

  iframe.addEventListener('load',()=>{
    if(iframe.src==='about:blank'||iframe.src==='') return;
    setTimeout(()=>{
      loadingOverlay.classList.add('hidden');
      playerFrame.classList.add('show');
    },300);
  });

  document.getElementById('reloadBtn').addEventListener('click',()=>{ if(activeIndex>=0) loadChannel(activeIndex); });
  document.getElementById('fullscreenBtn').addEventListener('click',()=>{ if(playerFrame.requestFullscreen) playerFrame.requestFullscreen(); });

  function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('show'); }
  function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  document.getElementById('menuBtn').addEventListener('click',()=>{ sidebar.classList.contains('open')?closeSidebar():openSidebar(); });
  overlay.addEventListener('click',closeSidebar);

  // ── Matchup Selector Logic ──
  function buildDropdown(side){
    renderDropdown(side, WC_TEAMS);
  }

  function renderDropdown(side, teams){
    const list = document.getElementById('list'+side);
    list.innerHTML='';
    teams.forEach(t=>{
      const div=document.createElement('div');
      div.className='dd-item'+(
        (side==='A'&&selectedA&&selectedA.slug===t.slug)||
        (side==='B'&&selectedB&&selectedB.slug===t.slug)
        ? ' selected':'');
      div.innerHTML=`<span class="flag">${t.flag}</span><span>${t.name}</span>`;
      div.addEventListener('click',()=>pickTeam(side,t));
      list.appendChild(div);
    });
  }

  function filterDD(side, query){
    const q=query.toLowerCase().trim();
    const filtered = q ? WC_TEAMS.filter(t=>t.name.toLowerCase().includes(q)) : WC_TEAMS;
    renderDropdown(side, filtered);
  }

  function toggleDropdown(side){
    const dd=document.getElementById('dropdown'+side);
    const other = side==='A'?'B':'A';
    document.getElementById('dropdown'+other).classList.remove('open');
    const isOpen=dd.classList.contains('open');
    dd.classList.toggle('open');
    if(!isOpen){
      document.getElementById('search'+side).value='';
      renderDropdown(side, WC_TEAMS);
      setTimeout(()=>document.getElementById('search'+side).focus(),50);
    }
  }

  function pickTeam(side, team){
    if(side==='A') selectedA=team;
    else selectedB=team;
    document.getElementById('flag'+side).textContent=team.flag;
    document.getElementById('name'+side).textContent=team.name;
    document.getElementById('dropdown'+side).classList.remove('open');
    updateWatchBtn();
    renderDropdown('A', WC_TEAMS);
    renderDropdown('B', WC_TEAMS);
  }

  function updateWatchBtn(){
    document.getElementById('watchBtn').disabled=!(selectedA&&selectedB&&selectedA.slug!==selectedB.slug);
  }

  function loadMatchup(){
    if(!selectedA||!selectedB||selectedA.slug===selectedB.slug) return;
    const url = BASE_URL+selectedA.slug+'-vs-'+selectedB.slug+'/7';
    channelTitle.textContent = selectedA.name+' vs '+selectedB.name;
    statusBadge.textContent='LIVE';
    placeholderMsg.style.display='none';
    iframe.style.display='block';
    loadingOverlay.classList.remove('hidden');
    playerFrame.classList.remove('show');
    iframe.src='about:blank';
    setTimeout(()=>{ iframe.src=url; },150);
    if(window.innerWidth<=860) closeSidebar();
  }

  // Close dropdowns when clicking outside
  document.addEventListener('click',e=>{
    ['A','B'].forEach(side=>{
      const sel=document.getElementById('selector'+side);
      if(!sel.contains(e.target)){
        document.getElementById('dropdown'+side).classList.remove('open');
      }
    });
  });

  buildDropdown('A');
  buildDropdown('B');
  renderPlaylist();
  playerFrame.classList.add('show');
</script>

</body>
</html>
