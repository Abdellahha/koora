<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var ua = navigator.userAgent || '';
  var isTV = /SmartTV|SMART-TV|Tizen|WebOS|Web0S|NetCast|HbbTV|BRAVIA|AFT[A-Z]|GoogleTV|AppleTV|CrKey|Roku|Vidaa|VIDAA|Hisense|PHILIPSTV|InettvBrowser|POV_TV|NETTV/i.test(ua);
  if(!isTV){
    try{
      var bigNoTouch = window.matchMedia('(min-width: 1800px)').matches && navigator.maxTouchPoints === 0 && !('ontouchstart' in window);
      if(bigNoTouch) isTV = true;
    }catch(e){}
  }
  if(isTV) document.documentElement.classList.add('tv-mode');
})();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Koora Live">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>World Cup 2026</title>
<style>
  :root {
    --border: rgba(255,255,255,0.14);
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
    --blue: #0a84ff;
    --green: #30d158;
    --panel: #121214;
    --panel-2: #1a1b1e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:100%; height:100%; background:#000; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; }

  .bg-glow { display:none; }

  .app { display:flex; height:100dvh; width:100dvw; position:relative; z-index:1; }

  .sidebar {
    width:300px; min-width:260px;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    transition:transform .2s ease;
    z-index:20; flex-shrink:0;
    overflow:hidden;
  }

  .back-link { display:flex; align-items:center; gap:6px; padding:14px 18px; border-bottom:1px solid var(--border); color:var(--muted); font-size:13px; text-decoration:none; flex-shrink:0; }
  .back-link:hover { color:var(--text); }
  .back-arrow { width:26px; height:26px; border-radius:8px; background:var(--panel-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; }

  .sidebar-header { padding:16px 18px 14px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .logo-pill { width:40px; height:40px; border-radius:12px; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .brand-info h1 { font-size:15px; font-weight:600; }
  .brand-info span { font-size:11px; color:var(--muted); }

  .match-picker {
    display:flex; flex-direction:column; gap:0;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    overflow:hidden;
  }

  .picker-header {
    padding:12px 14px;
    font-size:11px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; color:var(--muted);
    flex-shrink:0;
  }

  .selectors-wrap {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:0 12px 6px;
    flex-shrink:0;
  }

  .vs-divider {
    font-size:11px; font-weight:700; color:var(--muted);
    padding:2px 0;
    letter-spacing:1px;
  }

  .team-block { width:100%; display:flex; flex-direction:column; gap:0; }

  .team-btn {
    width:100%; padding:10px 12px; border-radius:12px;
    background:var(--panel-2); border:1px solid var(--border);
    color:var(--text); cursor:pointer; display:flex; align-items:center; gap:8px;
    font-size:13px; font-family:inherit; text-align:left;
    transition:background .15s, border-color .15s;
    position:relative; z-index:1;
  }
  .team-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.22); }
  .team-btn.open { border-radius:12px 12px 0 0; border-color:rgba(10,132,255,0.45); background:rgba(10,132,255,0.1); }
  .team-btn .flag { font-size:18px; flex-shrink:0; }
  .team-btn .tname { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13px; }
  .team-btn .arrow { font-size:10px; color:var(--muted); transition:transform .15s; }
  .team-btn.open .arrow { transform:rotate(180deg); }

  .team-list {
    max-height:0;
    overflow:hidden;
    transition:max-height .2s ease;
    background:#0e0f12;
    border:1px solid rgba(10,132,255,0.3);
    border-top:none;
    border-radius:0 0 12px 12px;
  }
  .team-list.open { max-height:200px; }

  .dd-search { padding:8px 8px 4px; }
  /* font-size 16px prevents iOS zoom on focus */
  .dd-search input {
    width:100%; padding:7px 10px; border-radius:9px;
    background:var(--panel-2); border:1px solid var(--border);
    color:var(--text); font-size:16px; font-family:inherit; outline:none;
    -webkit-appearance:none;
  }
  .dd-search input::placeholder { color:var(--muted); }
  .dd-scroll { max-height:148px; overflow-y:auto; padding:2px 6px 6px; -webkit-overflow-scrolling:touch; }
  .dd-scroll::-webkit-scrollbar { width:3px; }
  .dd-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }

  .dd-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:8px; cursor:pointer; font-size:12px; transition:background .12s; }
  .dd-item:hover { background:rgba(10,132,255,0.18); }
  .dd-item.selected { background:rgba(10,132,255,0.22); color:#6bb5ff; }
  .dd-item .flag { font-size:15px; }

  .watch-btn {
    margin:8px 12px 12px;
    padding:11px; border-radius:13px;
    background:var(--blue);
    border:1px solid rgba(10,132,255,0.5);
    color:#fff; font-size:13px; font-weight:600; font-family:inherit;
    cursor:pointer; transition:background .15s; letter-spacing:-0.1px;
    flex-shrink:0;
  }
  .watch-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .watch-btn:not(:disabled):hover { background:#2196ff; }
  .watch-btn:active { opacity:0.85; }

  .sidebar-footer { padding:14px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); flex-shrink:0; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:max(14px,env(safe-area-inset-top)) 20px 14px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .now-playing h2 { font-size:16px; font-weight:600; letter-spacing:-0.2px; }

  .glass-btn { height:36px; border-radius:11px; background:var(--panel-2); border:1px solid var(--border); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; font-size:15px; padding:0; width:36px; }
  .glass-btn:hover { background:rgba(255,255,255,0.12); }
  .glass-btn:active { opacity:0.8; }
  .menu-btn { display:none; }

  .live-badge { font-size:10px; font-weight:700; letter-spacing:0.8px; padding:4px 10px; border-radius:20px; background:rgba(10,132,255,0.15); color:#6bb5ff; border:1px solid rgba(10,132,255,0.35); }
  .controls { display:flex; gap:8px; }

  .player-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background:#000; position:relative; }
  .player-frame { width:100%; height:100%; max-width:1500px; border-radius:14px; overflow:hidden; background:#000; border:1px solid var(--border); position:relative; opacity:0; transition:opacity .25s; }
  .player-frame.show { opacity:1; }
  .player-frame iframe { width:100%; height:100%; border:0; display:block; }

  .placeholder-msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--muted); font-size:14px; text-align:center; padding:20px; }
  .placeholder-msg .ico { font-size:42px; }

  .loading-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; background:#0a0a0c; z-index:5; transition:opacity .2s; }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
  .spinner-ring { width:40px; height:40px; border-radius:50%; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--blue); animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:12px; color:var(--muted); }

  .backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:15; }

  @media (max-width:860px) {
    .sidebar { position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .backdrop.show { display:block; }
    .menu-btn { display:flex; }
    .player-wrap { padding:12px; }
    .player-frame { border-radius:10px; }
    .topbar { padding:max(14px,env(safe-area-inset-top)) 14px 14px; }
  }
  :focus-visible, .channel:focus, .glass-btn:focus, .card:focus, .team-btn:focus, .watch-btn:focus, .dd-item:focus, .back-link:focus { outline: 2px solid #ff3b30 !important; outline-offset: 2px; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="app">
  <div class="backdrop" id="backdrop"></div>

  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="back-link"><div class="back-arrow">←</div>Back to Home</a>

    <div class="sidebar-header">
      <div class="logo-pill">🏆</div>
      <div class="brand-info"><h1>World Cup 2026</h1><span>Pick a match to stream</span></div>
    </div>

    <div class="match-picker">
      <div class="picker-header">Select Teams</div>

      <div class="selectors-wrap">

        <div class="team-block">
          <button class="team-btn" id="btnA" onclick="toggleBlock('A')">
            <span class="flag" id="flagA">🌍</span>
            <span class="tname" id="nameA">Team 1…</span>
            <span class="arrow">▾</span>
          </button>
          <div class="team-list" id="listWrapA">
            <div class="dd-search"><input type="text" id="searchA" placeholder="Search country…" oninput="filterList('A',this.value)"></div>
            <div class="dd-scroll" id="listA"></div>
          </div>
        </div>

        <div class="vs-divider">— VS —</div>

        <div class="team-block">
          <button class="team-btn" id="btnB" onclick="toggleBlock('B')">
            <span class="flag" id="flagB">🌍</span>
            <span class="tname" id="nameB">Team 2…</span>
            <span class="arrow">▾</span>
          </button>
          <div class="team-list" id="listWrapB">
            <div class="dd-search"><input type="text" id="searchB" placeholder="Search country…" oninput="filterList('B',this.value)"></div>
            <div class="dd-scroll" id="listB"></div>
          </div>
        </div>

      </div>

      <button class="watch-btn" id="watchBtn" onclick="loadMatchup()" disabled>▶ Watch Match</button>
    </div>

    <div class="sidebar-footer">World Cup 2026 · Live Streams</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="glass-btn menu-btn" id="menuBtn">☰</button>
        <div class="now-playing">
          <h2 id="channelTitle">World Cup 2026</h2>
          <span class="live-badge">LIVE</span>
        </div>
      </div>
      <div class="controls">
        <button class="glass-btn" id="reloadBtn" title="Reload">⟳</button>
        <button class="glass-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="player-wrap">
      <div class="player-frame show" id="playerFrame">
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner-ring"></div>
          <div class="loading-text">Loading stream…</div>
        </div>
        <div class="placeholder-msg" id="placeholderMsg">
          <div class="ico">🏆</div>
          Pick two teams in the menu and hit Watch.
        </div>
        <iframe id="videoIframe" src="" allowfullscreen webkit-allowfullscreen playsinline webkit-playsinline allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          referrerpolicy="no-referrer" style="display:none;"></iframe>
      </div>
    </div>
  </main>
</div>

<script>
  // Disarm ad-shield on intentional navigation
  document.querySelectorAll('.back-link, #reloadBtn, #fullscreenBtn, #menuBtn').forEach(function (el) {
    el.addEventListener('click', function () { if (window.adShieldDisarm) window.adShieldDisarm(); }, true);
  });


  const WC_TEAMS = [
    {name:"Algeria",slug:"algeria",flag:"🇩🇿"},{name:"Argentina",slug:"argentina",flag:"🇦🇷"},
    {name:"Australia",slug:"australia",flag:"🇦🇺"},{name:"Austria",slug:"austria",flag:"🇦🇹"},
    {name:"Belgium",slug:"belgium",flag:"🇧🇪"},{name:"Bolivia",slug:"bolivia",flag:"🇧🇴"},
    {name:"Bosnia Herzegovina",slug:"bosnia-herzegovina",flag:"🇧🇦"},{name:"Brazil",slug:"brazil",flag:"🇧🇷"},
    {name:"Cameroon",slug:"cameroon",flag:"🇨🇲"},{name:"Canada",slug:"canada",flag:"🇨🇦"},
    {name:"Cape Verde",slug:"cape-verde",flag:"🇨🇻"},{name:"Chile",slug:"chile",flag:"🇨🇱"},
    {name:"Colombia",slug:"colombia",flag:"🇨🇴"},{name:"Costa Rica",slug:"costa-rica",flag:"🇨🇷"},
    {name:"Croatia",slug:"croatia",flag:"🇭🇷"},{name:"Curacao",slug:"cura-ao",flag:"🇨🇼"},
    {name:"Czechia",slug:"czechia",flag:"🇨🇿"},{name:"Denmark",slug:"denmark",flag:"🇩🇰"},
    {name:"DR Congo",slug:"dr-congo",flag:"🇨🇩"},{name:"Ecuador",slug:"ecuador",flag:"🇪🇨"},
    {name:"Egypt",slug:"egypt",flag:"🇪🇬"},{name:"England",slug:"england",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
    {name:"France",slug:"france",flag:"🇫🇷"},{name:"Germany",slug:"germany",flag:"🇩🇪"},
    {name:"Ghana",slug:"ghana",flag:"🇬🇭"},{name:"Haiti",slug:"haiti",flag:"🇭🇹"},
    {name:"Honduras",slug:"honduras",flag:"🇭🇳"},{name:"Hungary",slug:"hungary",flag:"🇭🇺"},
    {name:"Iran",slug:"iran",flag:"🇮🇷"},{name:"Iraq",slug:"iraq",flag:"🇮🇶"},
    {name:"Ivory Coast",slug:"ivory-coast",flag:"🇨🇮"},{name:"Jamaica",slug:"jamaica",flag:"🇯🇲"},
    {name:"Japan",slug:"japan",flag:"🇯🇵"},{name:"Jordan",slug:"jordan",flag:"🇯🇴"},
    {name:"Mexico",slug:"mexico",flag:"🇲🇽"},{name:"Morocco",slug:"morocco",flag:"🇲🇦"},
    {name:"Netherlands",slug:"netherlands",flag:"🇳🇱"},{name:"New Zealand",slug:"new-zealand",flag:"🇳🇿"},
    {name:"Nigeria",slug:"nigeria",flag:"🇳🇬"},{name:"Norway",slug:"norway",flag:"🇳🇴"},
    {name:"Panama",slug:"panama",flag:"🇵🇦"},{name:"Paraguay",slug:"paraguay",flag:"🇵🇾"},
    {name:"Portugal",slug:"portugal",flag:"🇵🇹"},{name:"Qatar",slug:"qatar",flag:"🇶🇦"},
    {name:"Saudi Arabia",slug:"saudi-arabia",flag:"🇸🇦"},{name:"Scotland",slug:"scotland",flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
    {name:"Senegal",slug:"senegal",flag:"🇸🇳"},{name:"Serbia",slug:"serbia",flag:"🇷🇸"},
    {name:"Slovakia",slug:"slovakia",flag:"🇸🇰"},{name:"South Africa",slug:"south-africa",flag:"🇿🇦"},
    {name:"South Korea",slug:"south-korea",flag:"🇰🇷"},{name:"Spain",slug:"spain",flag:"🇪🇸"},
    {name:"Sweden",slug:"sweden",flag:"🇸🇪"},{name:"Switzerland",slug:"switzerland",flag:"🇨🇭"},
    {name:"Trinidad and Tobago",slug:"trinidad-and-tobago",flag:"🇹🇹"},{name:"Tunisia",slug:"tunisia",flag:"🇹🇳"},
    {name:"Turkey",slug:"turkey",flag:"🇹🇷"},{name:"Ukraine",slug:"ukraine",flag:"🇺🇦"},
    {name:"United States",slug:"united-states",flag:"🇺🇸"},{name:"Uruguay",slug:"uruguay",flag:"🇺🇾"},
    {name:"Uzbekistan",slug:"uzbekistan",flag:"🇺🇿"},{name:"Venezuela",slug:"venezuela",flag:"🇻🇪"},
  ];

  const BASE_URL = "https://embed.st/embed/admin/ppv-";
  let selA = null, selB = null;

  const iframe    = document.getElementById('videoIframe');
  const frame     = document.getElementById('playerFrame');
  const loading   = document.getElementById('loadingOverlay');
  const pholder   = document.getElementById('placeholderMsg');
  const titleEl   = document.getElementById('channelTitle');
  const sidebar   = document.getElementById('sidebar');
  const backdrop  = document.getElementById('backdrop');

  function renderList(side, teams){
    const el = document.getElementById('list'+side);
    el.innerHTML = '';
    teams.forEach(t => {
      const d = document.createElement('div');
      d.className = 'dd-item' + ((side==='A'&&selA?.slug===t.slug)||(side==='B'&&selB?.slug===t.slug)?' selected':'');
      d.innerHTML = `<span class="flag">${t.flag}</span><span>${t.name}</span>`;
      d.addEventListener('click', () => pickTeam(side, t));
      el.appendChild(d);
    });
  }

  function filterList(side, q){
    const f = q ? WC_TEAMS.filter(t=>t.name.toLowerCase().includes(q.toLowerCase())) : WC_TEAMS;
    renderList(side, f);
  }

  function toggleBlock(side){
    const wrap = document.getElementById('listWrap'+side);
    const btn  = document.getElementById('btn'+side);
    const other = side==='A'?'B':'A';
    document.getElementById('listWrap'+other).classList.remove('open');
    document.getElementById('btn'+other).classList.remove('open');
    const isOpen = wrap.classList.contains('open');
    wrap.classList.toggle('open');
    btn.classList.toggle('open');
    if(!isOpen){
      document.getElementById('search'+side).value = '';
      renderList(side, WC_TEAMS);
      setTimeout(()=>document.getElementById('search'+side).focus(), 50);
    }
  }

  function pickTeam(side, team){
    if(side==='A') selA=team; else selB=team;
    document.getElementById('flag'+side).textContent = team.flag;
    document.getElementById('name'+side).textContent = team.name;
    document.getElementById('listWrap'+side).classList.remove('open');
    document.getElementById('btn'+side).classList.remove('open');
    document.getElementById('watchBtn').disabled = !(selA && selB && selA.slug!==selB.slug);
    renderList('A', WC_TEAMS);
    renderList('B', WC_TEAMS);
  }

  function loadMatchup(){
    if(!selA||!selB||selA.slug===selB.slug) return;
    const url = BASE_URL+selA.slug+'-vs-'+selB.slug+'/7';
    titleEl.textContent = selA.name+' vs '+selB.name;
    pholder.style.display = 'none';
    loading.classList.remove('hidden');
    frame.classList.remove('show');
    const old = document.getElementById('videoIframe');
    const newIframe = document.createElement('iframe');
    newIframe.id = 'videoIframe';
    newIframe.allowFullscreen = true;
    newIframe.setAttribute('webkit-allowfullscreen', '');
    newIframe.setAttribute('playsinline', '');
    newIframe.setAttribute('webkit-playsinline', '');
    newIframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
    newIframe.setAttribute('referrerpolicy', 'no-referrer');
    newIframe.style.cssText = 'width:100%;height:100%;border:0;display:block;';
    newIframe.addEventListener('load', onIframeLoad);
    old.replaceWith(newIframe);
    newIframe.src = url;
    if(window.innerWidth<=860) closeSidebar();
  }
  function onIframeLoad() {
    setTimeout(()=>{ loading.classList.add('hidden'); frame.classList.add('show'); }, 300);
  }
  document.getElementById('videoIframe').addEventListener('load', onIframeLoad);

  document.getElementById('reloadBtn').addEventListener('click', ()=>{
    const iframe = document.getElementById('videoIframe');
    if(iframe && iframe.src && iframe.src!=='about:blank'){ loading.classList.remove('hidden'); iframe.src=iframe.src; }
  });
  document.getElementById('fullscreenBtn').addEventListener('click', ()=>{
    const el=document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  });

  function openSidebar()  { sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('show'); }
  document.getElementById('menuBtn').addEventListener('click', ()=>sidebar.classList.contains('open')?closeSidebar():openSidebar());
  backdrop.addEventListener('click', closeSidebar);

  renderList('A', WC_TEAMS);
  renderList('B', WC_TEAMS);

  // Deep-link support: player2.html?a=team-slug&b=team-slug auto-picks both
  // teams and starts the stream immediately (used by matches.html cards).
  (function autoStartFromQuery(){
    try {
      const params = new URLSearchParams(window.location.search);
      const aSlug = params.get('a'), bSlug = params.get('b');
      if (!aSlug || !bSlug) return;
      const teamA = WC_TEAMS.find(t => t.slug === aSlug);
      const teamB = WC_TEAMS.find(t => t.slug === bSlug);
      if (!teamA || !teamB) return;
      pickTeam('A', teamA);
      pickTeam('B', teamB);
      loadMatchup();
    } catch (e) { console.warn('Deep-link auto-start failed:', e); }
  })();
</script>
<script src="ad-shield.js"></script>
<script src="tv-nav.js"></script>
</body>
</html>
