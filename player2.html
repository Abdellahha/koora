<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Koora Live">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>World Cup 2026</title>
<style>
  :root {
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.16);
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
    --blue: #0a84ff;
    --blue-glow: rgba(10,132,255,0.35);
    --green: #30d158;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width:100%; height:100%; background:#000; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; }

  .bg-glow { position:fixed; top:-200px; right:-100px; width:600px; height:600px; background:radial-gradient(circle, rgba(10,132,255,0.12) 0%, transparent 70%); pointer-events:none; z-index:0; }

  .app { display:flex; height:100dvh; width:100dvw; position:relative; z-index:1; }

  .sidebar { width:300px; min-width:260px; background:rgba(10,10,12,0.85); backdrop-filter:blur(40px) saturate(180%); -webkit-backdrop-filter:blur(40px) saturate(180%); border-right:1px solid var(--glass-border); display:flex; flex-direction:column; transition:transform .38s cubic-bezier(.4,0,.2,1); z-index:20; flex-shrink:0; }

  .back-link { display:flex; align-items:center; gap:6px; padding:14px 18px; border-bottom:1px solid var(--glass-border); color:var(--muted); font-size:13px; text-decoration:none; transition:color .2s; }
  .back-link:hover { color:var(--text); }
  .back-arrow { width:26px; height:26px; border-radius:8px; background:var(--glass); border:1px solid var(--glass-border); display:flex; align-items:center; justify-content:center; font-size:12px; }

  .sidebar-header { padding:18px 18px 14px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--glass-border); }
  .logo-pill { width:40px; height:40px; border-radius:12px; background:linear-gradient(145deg,rgba(10,132,255,0.6),rgba(10,132,255,0.25)); border:1px solid rgba(10,132,255,0.4); box-shadow:0 4px 16px rgba(10,132,255,0.3),inset 0 1px 0 rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .brand-info h1 { font-size:15px; font-weight:600; }
  .brand-info span { font-size:11px; color:var(--muted); }

  /* Matchup picker inside sidebar */
  .match-picker { padding:14px 12px; border-bottom:1px solid var(--glass-border); display:flex; flex-direction:column; gap:10px; }
  .picker-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; }

  .team-row { display:flex; align-items:center; gap:8px; }
  .vs-text { font-size:12px; color:var(--muted); font-weight:700; flex-shrink:0; }

  .team-selector { position:relative; flex:1; }
  .team-selector label { font-size:10px; color:var(--muted); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }

  .team-btn {
    width:100%; padding:9px 10px; border-radius:12px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    color:var(--text); cursor:pointer; display:flex; align-items:center; gap:7px;
    font-size:12px; font-family:inherit; transition:background .2s, border-color .2s;
    text-align:left;
  }
  .team-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.22); }
  .team-btn .flag { font-size:16px; flex-shrink:0; }
  .team-btn .tname { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team-btn .arrow { font-size:10px; color:var(--muted); margin-left:auto; flex-shrink:0; transition:transform .2s; }

  .team-dropdown {
    position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:100;
    background:rgba(18,18,22,0.96); backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid rgba(255,255,255,0.14); border-radius:14px;
    box-shadow:0 16px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.12);
    overflow:hidden; display:none;
  }
  .team-dropdown.open { display:block; }
  .dd-search { padding:10px 10px 6px; }
  .dd-search input { width:100%; padding:7px 10px; border-radius:9px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:var(--text); font-size:12px; font-family:inherit; outline:none; }
  .dd-search input::placeholder { color:var(--muted); }
  .dd-list { max-height:180px; overflow-y:auto; padding:4px 6px 8px; }
  .dd-list::-webkit-scrollbar { width:3px; }
  .dd-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
  .dd-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:9px; cursor:pointer; font-size:12px; transition:background .15s; }
  .dd-item:hover, .dd-item.selected { background:rgba(10,132,255,0.18); }
  .dd-item .flag { font-size:15px; }

  .watch-btn {
    width:100%; padding:11px; border-radius:13px;
    background:linear-gradient(145deg, rgba(10,132,255,0.7), rgba(10,132,255,0.4));
    border:1px solid rgba(10,132,255,0.5);
    box-shadow:0 6px 20px rgba(10,132,255,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
    color:#fff; font-size:13px; font-weight:600; font-family:inherit;
    cursor:pointer; transition:all .2s; letter-spacing:-0.1px;
  }
  .watch-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .watch-btn:not(:disabled):hover { background:linear-gradient(145deg,rgba(10,132,255,0.85),rgba(10,132,255,0.55)); transform:translateY(-1px); box-shadow:0 10px 28px rgba(10,132,255,0.4); }
  .watch-btn:active { transform:scale(0.97); }

  .playlist { flex:1; overflow-y:auto; padding:12px 10px; display:flex; flex-direction:column; gap:6px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent; }
  .playlist::-webkit-scrollbar { width:4px; }
  .playlist::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

  .empty-state { text-align:center; padding:30px 16px; color:var(--muted); font-size:13px; line-height:1.6; }
  .empty-state .ico { font-size:32px; margin-bottom:10px; }

  .sidebar-footer { padding:14px 18px; border-top:1px solid var(--glass-border); font-size:11px; color:var(--muted); }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:max(14px,env(safe-area-inset-top)) 20px 14px; background:rgba(10,10,12,0.7); backdrop-filter:blur(30px) saturate(160%); -webkit-backdrop-filter:blur(30px) saturate(160%); border-bottom:1px solid var(--glass-border); flex-shrink:0; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .now-playing h2 { font-size:16px; font-weight:600; letter-spacing:-0.2px; }

  .glass-btn { height:36px; border-radius:11px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); box-shadow:0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,transform .15s; font-size:15px; padding:0 12px; gap:6px; white-space:nowrap; }
  .glass-btn.icon-only { width:36px; padding:0; }
  .glass-btn:hover { background:rgba(255,255,255,0.12); }
  .glass-btn:active { transform:scale(0.95); }
  .menu-btn { display:none; }

  .live-badge { font-size:10px; font-weight:700; letter-spacing:0.8px; padding:4px 10px; border-radius:20px; background:rgba(10,132,255,0.15); color:#6bb5ff; border:1px solid rgba(10,132,255,0.35); }
  .controls { display:flex; gap:8px; }

  .player-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background:radial-gradient(ellipse at center,#0a0a0f 0%,#000 80%); position:relative; }
  .player-frame { width:100%; height:100%; max-width:1500px; border-radius:18px; overflow:hidden; background:#000; box-shadow:0 25px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.06); position:relative; opacity:0; transform:scale(.985); transition:opacity .45s,transform .45s; }
  .player-frame.show { opacity:1; transform:scale(1); }
  .player-frame iframe { width:100%; height:100%; border:0; display:block; }

  .placeholder-msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--muted); font-size:14px; text-align:center; padding:20px; }
  .placeholder-msg .ico { font-size:40px; }

  .loading-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; background:rgba(5,5,8,0.95); backdrop-filter:blur(20px); z-index:5; transition:opacity .35s; }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
  .spinner-ring { width:48px; height:48px; border-radius:50%; border:2.5px solid rgba(255,255,255,0.08); border-top-color:var(--blue); animation:spin .85s linear infinite; box-shadow:0 0 20px var(--blue-glow); }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:12px; color:var(--muted); }

  .backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:15; }

  @media (max-width:860px) {
    .sidebar { position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%); box-shadow:12px 0 50px rgba(0,0,0,.6); }
    .sidebar.open { transform:translateX(0); }
    .backdrop.show { display:block; }
    .menu-btn { display:flex; }
    .player-wrap { padding:12px; }
    .player-frame { border-radius:14px; }
    .topbar { padding:max(14px,env(safe-area-inset-top)) 14px 14px; }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="app">
  <div class="backdrop" id="backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="back-link"><div class="back-arrow">←</div>Back to Home</a>
    <div class="sidebar-header">
      <div class="logo-pill">🏆</div>
      <div class="brand-info"><h1>World Cup 2026</h1><span>Match Stream Selector</span></div>
    </div>

    <div class="match-picker">
      <div class="picker-label">Pick a match</div>
      <div class="team-row">
        <div class="team-selector" id="selectorA">
          <label>Home</label>
          <button class="team-btn" id="btnA" onclick="toggleDropdown('A')">
            <span class="flag" id="flagA">🌍</span>
            <span class="tname" id="nameA">Select team…</span>
            <span class="arrow">▾</span>
          </button>
          <div class="team-dropdown" id="dropdownA">
            <div class="dd-search"><input type="text" placeholder="Search…" oninput="filterDD('A',this.value)" id="searchA"></div>
            <div class="dd-list" id="listA"></div>
          </div>
        </div>
        <div class="vs-text">VS</div>
        <div class="team-selector" id="selectorB">
          <label>Away</label>
          <button class="team-btn" id="btnB" onclick="toggleDropdown('B')">
            <span class="flag" id="flagB">🌍</span>
            <span class="tname" id="nameB">Select team…</span>
            <span class="arrow">▾</span>
          </button>
          <div class="team-dropdown" id="dropdownB">
            <div class="dd-search"><input type="text" placeholder="Search…" oninput="filterDD('B',this.value)" id="searchB"></div>
            <div class="dd-list" id="listB"></div>
          </div>
        </div>
      </div>
      <button class="watch-btn" id="watchBtn" onclick="loadMatchup()" disabled>▶ Watch Match</button>
    </div>

    <div class="playlist" id="playlist"></div>
    <div class="sidebar-footer">World Cup 2026 · Live Streams</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="glass-btn icon-only menu-btn" id="menuBtn">☰</button>
        <div class="now-playing">
          <h2 id="channelTitle">World Cup 2026</h2>
          <span class="live-badge" id="statusBadge">LIVE</span>
        </div>
      </div>
      <div class="controls">
        <button class="glass-btn icon-only" id="reloadBtn" title="Reload">⟳</button>
        <button class="glass-btn icon-only" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>
    <div class="player-wrap">
      <div class="player-frame show" id="playerFrame">
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner-ring"></div>
          <div class="loading-text">Loading stream…</div>
        </div>
        <div class="placeholder-msg" id="placeholderMsg">
          <div class="ico">🏆</div>
          Pick two teams above and hit Watch to start the stream.
        </div>
        <iframe id="videoIframe" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-forms allow-popups-to-escape-sandbox" referrerpolicy="no-referrer" style="display:none;"></iframe>
      </div>
    </div>
  </main>
</div>

<script>
  // Popup blocker — allow nothing to open a new window
  window.open = function(url) { console.warn('Popup blocked:', url); return null; };
  document.addEventListener('click', function(e) {
    const a = e.target.closest('a');
    if (a && a.target === '_blank') { e.preventDefault(); e.stopPropagation(); }
  }, true);

  const WC_TEAMS = [
    {name:"Algeria",slug:"algeria",flag:"🇩🇿"},{name:"Argentina",slug:"argentina",flag:"🇦🇷"},
    {name:"Australia",slug:"australia",flag:"🇦🇺"},{name:"Austria",slug:"austria",flag:"🇦🇹"},
    {name:"Belgium",slug:"belgium",flag:"🇧🇪"},{name:"Bolivia",slug:"bolivia",flag:"🇧🇴"},
    {name:"Bosnia Herzegovina",slug:"bosnia-herzegovina",flag:"🇧🇦"},{name:"Brazil",slug:"brazil",flag:"🇧🇷"},
    {name:"Cameroon",slug:"cameroon",flag:"🇨🇲"},{name:"Canada",slug:"canada",flag:"🇨🇦"},
    {name:"Cape Verde",slug:"cape-verde",flag:"🇨🇻"},{name:"Chile",slug:"chile",flag:"🇨🇱"},
    {name:"Colombia",slug:"colombia",flag:"🇨🇴"},{name:"Costa Rica",slug:"costa-rica",flag:"🇨🇷"},
    {name:"Croatia",slug:"croatia",flag:"🇭🇷"},{name:"Curacao",slug:"cura-ao",flag:"🇨🇼"},
    {name:"Czechia",slug:"czechia",flag:"🇨🇿"},{name:"Denmark",slug:"denmark",flag:"🇩🇰"},
    {name:"DR Congo",slug:"dr-congo",flag:"🇨🇩"},{name:"Ecuador",slug:"ecuador",flag:"🇪🇨"},
    {name:"Egypt",slug:"egypt",flag:"🇪🇬"},{name:"England",slug:"england",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
    {name:"France",slug:"france",flag:"🇫🇷"},{name:"Germany",slug:"germany",flag:"🇩🇪"},
    {name:"Ghana",slug:"ghana",flag:"🇬🇭"},{name:"Haiti",slug:"haiti",flag:"🇭🇹"},
    {name:"Honduras",slug:"honduras",flag:"🇭🇳"},{name:"Hungary",slug:"hungary",flag:"🇭🇺"},
    {name:"Iran",slug:"iran",flag:"🇮🇷"},{name:"Iraq",slug:"iraq",flag:"🇮🇶"},
    {name:"Ivory Coast",slug:"ivory-coast",flag:"🇨🇮"},{name:"Jamaica",slug:"jamaica",flag:"🇯🇲"},
    {name:"Japan",slug:"japan",flag:"🇯🇵"},{name:"Jordan",slug:"jordan",flag:"🇯🇴"},
    {name:"Mexico",slug:"mexico",flag:"🇲🇽"},{name:"Morocco",slug:"morocco",flag:"🇲🇦"},
    {name:"Netherlands",slug:"netherlands",flag:"🇳🇱"},{name:"New Zealand",slug:"new-zealand",flag:"🇳🇿"},
    {name:"Nigeria",slug:"nigeria",flag:"🇳🇬"},{name:"Norway",slug:"norway",flag:"🇳🇴"},
    {name:"Panama",slug:"panama",flag:"🇵🇦"},{name:"Paraguay",slug:"paraguay",flag:"🇵🇾"},
    {name:"Portugal",slug:"portugal",flag:"🇵🇹"},{name:"Qatar",slug:"qatar",flag:"🇶🇦"},
    {name:"Saudi Arabia",slug:"saudi-arabia",flag:"🇸🇦"},{name:"Scotland",slug:"scotland",flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
    {name:"Senegal",slug:"senegal",flag:"🇸🇳"},{name:"Serbia",slug:"serbia",flag:"🇷🇸"},
    {name:"Slovakia",slug:"slovakia",flag:"🇸🇰"},{name:"South Africa",slug:"south-africa",flag:"🇿🇦"},
    {name:"South Korea",slug:"south-korea",flag:"🇰🇷"},{name:"Spain",slug:"spain",flag:"🇪🇸"},
    {name:"Sweden",slug:"sweden",flag:"🇸🇪"},{name:"Switzerland",slug:"switzerland",flag:"🇨🇭"},
    {name:"Trinidad and Tobago",slug:"trinidad-and-tobago",flag:"🇹🇹"},{name:"Tunisia",slug:"tunisia",flag:"🇹🇳"},
    {name:"Turkey",slug:"turkey",flag:"🇹🇷"},{name:"Ukraine",slug:"ukraine",flag:"🇺🇦"},
    {name:"United States",slug:"united-states",flag:"🇺🇸"},{name:"Uruguay",slug:"uruguay",flag:"🇺🇾"},
    {name:"Uzbekistan",slug:"uzbekistan",flag:"🇺🇿"},{name:"Venezuela",slug:"venezuela",flag:"🇻🇪"},
  ];
  const BASE_URL = "https://embed.st/embed/admin/ppv-";
  let selectedA = null, selectedB = null;

  const iframe = document.getElementById('videoIframe');
  const frame = document.getElementById('playerFrame');
  const loading = document.getElementById('loadingOverlay');
  const placeholder = document.getElementById('placeholderMsg');
  const titleEl = document.getElementById('channelTitle');
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('backdrop');

  function renderDropdown(side, teams) {
    const list = document.getElementById('list'+side);
    list.innerHTML = '';
    teams.forEach(t => {
      const div = document.createElement('div');
      div.className = 'dd-item' + ((side==='A'&&selectedA?.slug===t.slug)||(side==='B'&&selectedB?.slug===t.slug)?' selected':'');
      div.innerHTML = `<span class="flag">${t.flag}</span><span>${t.name}</span>`;
      div.addEventListener('click', () => pickTeam(side, t));
      list.appendChild(div);
    });
  }
  function filterDD(side, q) {
    const f = q ? WC_TEAMS.filter(t=>t.name.toLowerCase().includes(q.toLowerCase())) : WC_TEAMS;
    renderDropdown(side, f);
  }
  function toggleDropdown(side) {
    const dd = document.getElementById('dropdown'+side);
    const other = side==='A'?'B':'A';
    document.getElementById('dropdown'+other).classList.remove('open');
    dd.classList.toggle('open');
    if (dd.classList.contains('open')) {
      document.getElementById('search'+side).value = '';
      renderDropdown(side, WC_TEAMS);
      setTimeout(() => document.getElementById('search'+side).focus(), 50);
    }
  }
  function pickTeam(side, team) {
    if (side==='A') selectedA=team; else selectedB=team;
    document.getElementById('flag'+side).textContent = team.flag;
    document.getElementById('name'+side).textContent = team.name;
    document.getElementById('dropdown'+side).classList.remove('open');
    document.getElementById('watchBtn').disabled = !(selectedA&&selectedB&&selectedA.slug!==selectedB.slug);
    renderDropdown('A',WC_TEAMS); renderDropdown('B',WC_TEAMS);
  }
  function loadMatchup() {
    if (!selectedA||!selectedB||selectedA.slug===selectedB.slug) return;
    const url = BASE_URL+selectedA.slug+'-vs-'+selectedB.slug+'/7';
    titleEl.textContent = selectedA.name+' vs '+selectedB.name;
    placeholder.style.display = 'none';
    iframe.style.display = 'block';
    loading.classList.remove('hidden');
    frame.classList.remove('show');
    iframe.src = 'about:blank';
    setTimeout(() => { iframe.src = url; }, 160);
    if (window.innerWidth<=860) closeSidebar();
  }
  iframe.addEventListener('load', () => {
    if (!iframe.src||iframe.src==='about:blank') return;
    setTimeout(() => { loading.classList.add('hidden'); frame.classList.add('show'); }, 300);
  });

  document.getElementById('reloadBtn').addEventListener('click', () => { if (iframe.src&&iframe.src!=='about:blank') { loading.classList.remove('hidden'); iframe.src=iframe.src; } });
  document.getElementById('fullscreenBtn').addEventListener('click', () => { const el=document.documentElement; if(el.requestFullscreen)el.requestFullscreen(); else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen(); });
  function openSidebar()  { sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('show'); }
  document.getElementById('menuBtn').addEventListener('click', () => sidebar.classList.contains('open')?closeSidebar():openSidebar());
  backdrop.addEventListener('click', closeSidebar);
  document.addEventListener('click', e => {
    ['A','B'].forEach(s => { const sel=document.getElementById('selector'+s); if(!sel.contains(e.target)) document.getElementById('dropdown'+s).classList.remove('open'); });
  });

  renderDropdown('A',WC_TEAMS); renderDropdown('B',WC_TEAMS);
</script>
</body>
</html>
