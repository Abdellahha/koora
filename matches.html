<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var ua = navigator.userAgent || '';
  var isTV = /SmartTV|SMART-TV|Tizen|WebOS|Web0S|NetCast|HbbTV|BRAVIA|AFT[A-Z]|GoogleTV|AppleTV|CrKey|Roku|Vidaa|VIDAA|Hisense|PHILIPSTV|InettvBrowser|POV_TV|NETTV/i.test(ua);
  if(!isTV){ try{ var big=window.matchMedia('(min-width:1800px)').matches&&navigator.maxTouchPoints===0&&!('ontouchstart' in window); if(big) isTV=true; }catch(e){} }
  if(isTV) document.documentElement.classList.add('tv-mode');
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Live Matches</title>
<style>
:root {
  --border: rgba(255,255,255,0.12);
  --text: #fff;
  --muted: rgba(255,255,255,0.45);
  --blue: #0a84ff;
  --red: #e53935;
  --panel: #101012;
  --panel2: #18181c;
  --panel3: #1f1f24;
  --radius: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
.app{display:flex;height:100dvh;width:100dvw;}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar{
  width:290px;min-width:260px;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:20;flex-shrink:0;overflow:hidden;
}
.sb-head{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.sb-home-btn{
  height:30px;width:30px;border-radius:8px;
  background:var(--panel2);border:1px solid var(--border);
  color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;text-decoration:none;
  transition:background .15s;flex-shrink:0;
}
.sb-home-btn:hover{background:rgba(255,255,255,0.1);}
.sb-clock{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;flex:1;text-align:center;}

.sb-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-tab{
  flex:1;padding:9px 4px;text-align:center;
  font-size:11px;font-weight:600;letter-spacing:0.5px;
  color:var(--muted);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.sb-tab.active{color:var(--text);border-bottom-color:var(--red);}
.sb-tab .cnt{
  font-size:10px;border-radius:20px;padding:1px 6px;
  background:rgba(229,57,53,0.2);color:var(--red);
  font-weight:700;min-width:16px;text-align:center;
}
.sb-tab.tab-up .cnt{background:rgba(10,132,255,0.18);color:#6bb5ff;}

.matches-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;}
.matches-scroll::-webkit-scrollbar{width:3px;}
.matches-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

.refresh-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px 4px;font-size:10px;color:var(--muted);flex-shrink:0;
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}

/* match cards */
.mcard{
  background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  margin-bottom:7px;padding:10px 12px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:border-color .15s,background .15s;
  position:relative;overflow:hidden;
  outline:none;
}
.mcard:hover,.mcard.focused{border-color:rgba(255,255,255,0.28);background:var(--panel3);}
.mcard.active{border-color:var(--blue);background:rgba(10,132,255,0.08);}
.mcard.focused{border-color:rgba(255,255,255,0.5)!important;box-shadow:0 0 0 2px rgba(255,255,255,0.15);}
.mcard.live-card{border-color:rgba(229,57,53,0.3);background:linear-gradient(135deg,#1a0e0e 0%,var(--panel2) 100%);}
.mcard.live-card::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--red);border-radius:10px 0 0 10px;}
.mcard.no-stream{opacity:.55;cursor:not-allowed;}

.mcard-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.mcard-row{display:flex;align-items:center;gap:6px;font-size:12px;line-height:1.2;}
.mcard-flag{font-size:14px;flex-shrink:0;}
.mcard-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcard-goal{font-variant-numeric:tabular-nums;font-weight:700;color:#fff;min-width:14px;text-align:center;}
.mcard-vs{font-size:10px;color:var(--muted);padding:0 4px;}
.mcard-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.badge-live{font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 7px;border-radius:20px;background:var(--red);color:#fff;white-space:nowrap;}
.badge-time{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(10,132,255,0.15);color:#90caf9;border:1px solid rgba(10,132,255,0.25);white-space:nowrap;font-variant-numeric:tabular-nums;}
.badge-ended{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,0.06);color:var(--muted);}
.no-stream-tag{font-size:9px;color:var(--muted);margin-top:1px;}
.empty{padding:28px 10px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}

.sb-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 20px;color:var(--muted);font-size:12px;}
.spin-sm{width:28px;height:28px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MAIN PLAYER ─────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:max(12px,env(safe-area-inset-top)) 18px 12px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.now-playing h2{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
.live-badge{font-size:9px;font-weight:700;letter-spacing:.8px;padding:3px 9px;border-radius:20px;background:rgba(10,132,255,0.15);color:#6bb5ff;border:1px solid rgba(10,132,255,0.3);}
.glass-btn{height:34px;min-width:34px;padding:0 8px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;font-size:15px;gap:5px;text-decoration:none;}
.glass-btn:hover{background:rgba(255,255,255,0.1);}
.glass-btn span{font-size:12px;font-weight:500;}
.controls{display:flex;gap:7px;}

.player-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;background:#000;position:relative;}
.player-frame{width:100%;height:100%;max-width:1600px;border-radius:14px;overflow:hidden;background:#000;border:1px solid var(--border);position:relative;}
.player-frame iframe{width:100%;height:100%;border:0;display:block;opacity:0;transition:opacity .25s;}
.player-frame iframe.show{opacity:1;}
.loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#080808;z-index:5;transition:opacity .2s;border-radius:14px;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner-ring{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--blue);animation:spin .8s linear infinite;}
.loading-text{font-size:12px;color:var(--muted);}
.placeholder-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:13px;text-align:center;padding:20px;line-height:1.7;}
.placeholder-msg .ico{font-size:46px;margin-bottom:4px;}

:focus-visible,
.mcard:focus, .glass-btn:focus, .sb-home-btn:focus,
.sb-tab:focus, .card:focus, .back-link:focus, a:focus, button:focus {
  outline: 2px solid #ff3b30 !important;
  outline-offset: 2px;
}

.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:15;}
.menu-btn{display:none;}

@media(max-width:800px){
  .sidebar{position:fixed;top:0;right:0;bottom:0;transform:translateX(100%);transition:transform .2s;}
  .sidebar.open{transform:translateX(0);}
  .backdrop.show{display:block;}
  .menu-btn{display:flex;}
  .player-wrap{padding:10px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="backdrop" id="backdrop"></div>

  <!-- MAIN PLAYER -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="glass-btn menu-btn" id="menuBtn">☰</button>
        <a class="glass-btn" href="home.html" title="Home">🏠 <span>Home</span></a>
        <div class="now-playing">
          <h2 id="channelTitle">Live Matches</h2>
          <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
        </div>
      </div>
      <div class="controls">
        <button class="glass-btn" id="reloadBtn" title="Reload">⟳</button>
        <button class="glass-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="player-wrap">
      <div class="player-frame" id="playerFrame">
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner-ring"></div>
          <div class="loading-text">Loading stream…</div>
        </div>
        <div class="placeholder-msg" id="placeholderMsg">
          <div class="ico">⚽</div>
          <strong>Pick a match from the list</strong>
          <span style="font-size:12px">Live and upcoming matches · auto-refreshes every minute</span>
        </div>
        <iframe id="videoIframe" src=""
          allowfullscreen webkit-allowfullscreen playsinline webkit-playsinline
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          referrerpolicy="strict-origin-when-cross-origin"
          style="width:100%;height:100%;border:0;display:block;"></iframe>
      </div>
    </div>
  </main>

  <!-- SIDEBAR: MATCHES -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <a class="sb-home-btn" href="home.html" title="Home">🏠</a>
      <div class="sb-clock" id="sbClock">--:--:--</div>
    </div>

    <div class="sb-tabs">
      <button class="sb-tab active" id="tabLive" onclick="showTab('live')">
        <span class="pulse"></span> Live <span class="cnt" id="cntLive">0</span>
      </button>
      <button class="sb-tab tab-up" id="tabUp" onclick="showTab('upcoming')">
        ⏰ Upcoming <span class="cnt" id="cntUp">0</span>
      </button>
    </div>

    <div class="refresh-bar">
      <span id="refreshLabel">Loading…</span>
      <span class="pulse"></span>
    </div>

    <div class="matches-scroll" id="matchesScroll">
      <div class="sb-loading" id="sbLoading">
        <div class="spin-sm"></div>
        <span>Loading matches…</span>
      </div>
    </div>
  </aside>
</div>

<script>
// ── AD / POPUP GUARD ──────────────────────────────────────────
// Handled by ad-shield.js — just disarm on intentional navigation
document.querySelectorAll('#reloadBtn,#fullscreenBtn,#menuBtn').forEach(function(el){
  el.addEventListener('click', function(){ if(window.adShieldDisarm) window.adShieldDisarm(); }, true);
});

// ── TEAM SLUG MAP ─────────────────────────────────────────────
const SLUG_MAP = {
  'الجزائر':'algeria','الأرجنتين':'argentina','أستراليا':'australia',
  'النمسا':'austria','بلجيكا':'belgium','بوليفيا':'bolivia',
  'البوسنة والهرسك':'bosnia-herzegovina','البرازيل':'brazil',
  'الكاميرون':'cameroon','كندا':'canada','الرأس الأخضر':'cape-verde',
  'تشيلي':'chile','كولومبيا':'colombia','كوستاريكا':'costa-rica',
  'كرواتيا':'croatia','كوراكاو':'curacao','التشيك':'czechia',
  'الدنمارك':'denmark','الكونغو الديمقراطية':'dr-congo','الإكوادور':'ecuador',
  'مصر':'egypt','إنجلترا':'england','فرنسا':'france','ألمانيا':'germany',
  'غانا':'ghana','هايتي':'haiti','هندوراس':'honduras','المجر':'hungary',
  'إيران':'iran','العراق':'iraq','ساحل العاج':'ivory-coast',
  'جامايكا':'jamaica','اليابان':'japan','الأردن':'jordan',
  'المكسيك':'mexico','المغرب':'morocco','هولندا':'netherlands',
  'نيوزيلندا':'new-zealand','نيجيريا':'nigeria','النرويج':'norway',
  'بنما':'panama','باراغواي':'paraguay','البرتغال':'portugal',
  'قطر':'qatar','السعودية':'saudi-arabia','المملكة العربية السعودية':'saudi-arabia',
  'اسكتلندا':'scotland','السنغال':'senegal','صربيا':'serbia',
  'سلوفاكيا':'slovakia','جنوب أفريقيا':'south-africa','كوريا الجنوبية':'south-korea',
  'إسبانيا':'spain','السويد':'sweden','سويسرا':'switzerland',
  'ترينيداد وتوباغو':'trinidad-and-tobago','تونس':'tunisia',
  'تركيا':'turkey','أوكرانيا':'ukraine','الولايات المتحدة':'united-states',
  'أوروغواي':'uruguay','أوزبكستان':'uzbekistan','فنزويلا':'venezuela',
  'algeria':'algeria','argentina':'argentina','australia':'australia',
  'austria':'austria','belgium':'belgium','bolivia':'bolivia',
  'brazil':'brazil','cameroon':'cameroon','canada':'canada',
  'chile':'chile','colombia':'colombia','croatia':'croatia',
  'czechia':'czechia','denmark':'denmark','ecuador':'ecuador',
  'egypt':'egypt','england':'england','france':'france',
  'germany':'germany','ghana':'ghana','honduras':'honduras',
  'hungary':'hungary','iran':'iran','iraq':'iraq',
  'jamaica':'jamaica','japan':'japan','jordan':'jordan',
  'mexico':'mexico','morocco':'morocco','nigeria':'nigeria',
  'norway':'norway','panama':'panama','paraguay':'paraguay',
  'portugal':'portugal','qatar':'qatar','scotland':'scotland',
  'senegal':'senegal','serbia':'serbia','slovakia':'slovakia',
  'spain':'spain','sweden':'sweden','switzerland':'switzerland',
  'tunisia':'tunisia','turkey':'turkey','ukraine':'ukraine',
  'uruguay':'uruguay','venezuela':'venezuela',
};
const FLAGS = {
  'algeria':'🇩🇿','argentina':'🇦🇷','australia':'🇦🇺','austria':'🇦🇹',
  'belgium':'🇧🇪','bolivia':'🇧🇴','bosnia-herzegovina':'🇧🇦','brazil':'🇧🇷',
  'cameroon':'🇨🇲','canada':'🇨🇦','cape-verde':'🇨🇻','chile':'🇨🇱',
  'colombia':'🇨🇴','costa-rica':'🇨🇷','croatia':'🇭🇷','curacao':'🇨🇼',
  'czechia':'🇨🇿','denmark':'🇩🇰','dr-congo':'🇨🇩','ecuador':'🇪🇨',
  'egypt':'🇪🇬','england':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','france':'🇫🇷','germany':'🇩🇪',
  'ghana':'🇬🇭','haiti':'🇭🇹','honduras':'🇭🇳','hungary':'🇭🇺',
  'iran':'🇮🇷','iraq':'🇮🇶','ivory-coast':'🇨🇮','jamaica':'🇯🇲',
  'japan':'🇯🇵','jordan':'🇯🇴','mexico':'🇲🇽','morocco':'🇲🇦',
  'netherlands':'🇳🇱','new-zealand':'🇳🇿','nigeria':'🇳🇬','norway':'🇳🇴',
  'panama':'🇵🇦','paraguay':'🇵🇾','portugal':'🇵🇹','qatar':'🇶🇦',
  'saudi-arabia':'🇸🇦','scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','senegal':'🇸🇳','serbia':'🇷🇸',
  'slovakia':'🇸🇰','south-africa':'🇿🇦','south-korea':'🇰🇷','spain':'🇪🇸',
  'sweden':'🇸🇪','switzerland':'🇨🇭','trinidad-and-tobago':'🇹🇹','tunisia':'🇹🇳',
  'turkey':'🇹🇷','ukraine':'🇺🇦','united-states':'🇺🇸','uruguay':'🇺🇾',
  'uzbekistan':'🇺🇿','venezuela':'🇻🇪',
};
const BASE_URL = 'https://embed.st/embed/admin/ppv-';

function toSlug(name) {
  if (!name) return null;
  const clean = name.trim();
  if (SLUG_MAP[clean]) return SLUG_MAP[clean];
  const lo = clean.toLowerCase();
  if (SLUG_MAP[lo]) return SLUG_MAP[lo];
  for (const [k, v] of Object.entries(SLUG_MAP)) {
    if (clean.includes(k) || k.includes(clean)) return v;
  }
  return null;
}
function buildStreamUrl(slugA, slugB) { return BASE_URL + slugA + '-vs-' + slugB + '/7'; }

// ── CLOCK ─────────────────────────────────────────────────────
function updateClock() {
  const t = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone:'Africa/Casablanca' });
  document.getElementById('sbClock').textContent = t;
}
setInterval(updateClock, 1000);
updateClock();

// ── TAB STATE ─────────────────────────────────────────────────
let currentTab = 'live';
let allMatches = { live: [], upcoming: [] };
let activeCard = null;

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tabLive').classList.toggle('active', tab === 'live');
  document.getElementById('tabUp').classList.toggle('active', tab === 'upcoming');
  renderTab();
}

function renderTab() {
  const list = allMatches[currentTab];
  const scroll = document.getElementById('matchesScroll');
  if (!list.length) {
    scroll.innerHTML = '<div class="empty">' +
      (currentTab === 'live' ? 'No live matches right now' : 'No upcoming matches') + '</div>';
    return;
  }
  scroll.innerHTML = list.map((m, i) => buildCard(m, i)).join('');
}

function buildCard(m, i) {
  const hasStream = !!(m.slugA && m.slugB);
  const isLive = m.status === 'live';
  const isEnded = m.status === 'ended';
  const flagA = (m.slugA && FLAGS[m.slugA]) || '⚽';
  const flagB = (m.slugB && FLAGS[m.slugB]) || '⚽';
  const badge = isLive
    ? `<span class="badge-live">● LIVE</span>`
    : isEnded
    ? `<span class="badge-ended">Ended</span>`
    : `<span class="badge-time">${m.time}</span>`;
  const noStreamTag = !hasStream ? `<div class="no-stream-tag">⚠ No stream</div>` : '';
  const scoreA = (isLive || isEnded) && m.scoreA !== '' ? `<span class="mcard-goal">${m.scoreA}</span>` : '';
  const scoreB = (isLive || isEnded) && m.scoreB !== '' ? `<span class="mcard-goal">${m.scoreB}</span>` : '';
  return `<div class="mcard ${isLive?'live-card':''} ${!hasStream?'no-stream':''}"
    id="card-${i}" tabindex="${hasStream?'0':'-1'}" onclick="${hasStream?'loadMatch('+i+')':''}" onkeydown="if(event.key==='Enter'&&${hasStream}) loadMatch(${i})">
    <div class="mcard-teams">
      <div class="mcard-row">
        <span class="mcard-flag">${flagA}</span>
        <span class="mcard-name">${m.home}</span>${scoreA}
      </div>
      <div class="mcard-vs">vs</div>
      <div class="mcard-row">
        <span class="mcard-flag">${flagB}</span>
        <span class="mcard-name">${m.away}</span>${scoreB}
      </div>
      ${noStreamTag}
    </div>
    <div class="mcard-meta">${badge}</div>
  </div>`;
}

function loadMatch(i) {
  const list = allMatches[currentTab];
  const m = list[i];
  if (!m || !m.slugA || !m.slugB) return;
  if (activeCard) activeCard.classList.remove('active');
  const card = document.getElementById('card-' + i);
  if (card) { card.classList.add('active'); activeCard = card; }
  const url = buildStreamUrl(m.slugA, m.slugB);
  document.getElementById('channelTitle').textContent = m.home + ' vs ' + m.away;
  document.getElementById('liveBadge').style.display = m.status === 'live' ? '' : 'none';
  document.getElementById('placeholderMsg').style.display = 'none';
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.remove('hidden');
  const old = document.getElementById('videoIframe');
  const nf = document.createElement('iframe');
  nf.id = 'videoIframe';
  nf.allowFullscreen = true;
  nf.setAttribute('webkit-allowfullscreen', '');
  nf.setAttribute('playsinline', '');
  nf.setAttribute('webkit-playsinline', '');
  nf.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
  nf.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
  nf.style.cssText = 'width:100%;height:100%;border:0;display:block;';
  nf.addEventListener('load', function() {
    setTimeout(function(){ overlay.classList.add('hidden'); nf.classList.add('show'); }, 400);
  });
  old.replaceWith(nf);
  nf.src = url;
  if (window.innerWidth <= 800) closeSidebar();
}

// ── FETCH & PARSE (fast: 3 proxies in race) ───────────────────
const PROXIES = [
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
];
const SOURCE = 'https://koray-live.net/';
let countdown = 60;
let cdTimer = null;

async function fetchWithProxy(proxyFn) {
  const res = await fetch(proxyFn(SOURCE), { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('bad status');
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json')) {
    const j = await res.json();
    return j.contents || j.data || '';
  }
  return await res.text();
}

async function fetchMatches() {
  document.getElementById('refreshLabel').textContent = 'Refreshing…';
  let html = '';
  // Race all proxies — first valid response wins
  try {
    html = await Promise.any(PROXIES.map(fn => fetchWithProxy(fn)));
  } catch(e) {
    // All failed
  }
  if (html) {
    const parsed = parseHTML(html);
    allMatches.live = parsed.filter(m => m.status === 'live');
    allMatches.upcoming = parsed.filter(m => m.status === 'upcoming');
    document.getElementById('cntLive').textContent = allMatches.live.length;
    document.getElementById('cntUp').textContent = allMatches.upcoming.length;
    document.getElementById('sbLoading').style.display = 'none';
    renderTab();
  } else {
    document.getElementById('sbLoading').style.display = 'none';
    document.getElementById('matchesScroll').innerHTML =
      '<div class="empty">Failed to load matches<br><small>Check your connection</small></div>';
  }
  startCountdown();
}

function parseHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const matches = [];
  const blocks = doc.querySelectorAll('a[href*="watch"], a[href*="hes-goals"], a[href*="koraylive"]');
  blocks.forEach(link => {
    const parent = link.closest('div, li, article, section') || link.parentElement;
    if (!parent) return;
    const imgs = parent.querySelectorAll('img');
    const texts = Array.from(parent.querySelectorAll('*'))
      .filter(el => el.children.length === 0 && el.textContent.trim())
      .map(el => el.textContent.trim()).filter(Boolean);
    const teamNames = Array.from(imgs)
      .map(img => img.alt || img.getAttribute('title') || '').filter(n => n.length > 1);
    if (teamNames.length < 2) return;
    const home = teamNames[0], away = teamNames[1];
    const scoreText = texts.find(t => /\d+-\d+/.test(t)) || '';
    const timeText = texts.find(t => /\d{1,2}:\d{2}/.test(t) || /انته|مباشر|بعد قليل|لم تبدأ/.test(t)) || '';
    const statusText = texts.find(t => /انته|مباشر|بعد قليل|لم تبدأ/.test(t)) || '';
    const { a: scoreA, b: scoreB } = parseScore(scoreText);
    const status = detectStatus(statusText || timeText || scoreText);
    const time = normTime(timeText || '');
    matches.push({ home, away, slugA: toSlug(home), slugB: toSlug(away), scoreA, scoreB, time, status });
  });
  const seen = new Set();
  return matches.filter(m => {
    const key = m.home + '|' + m.away;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

function detectStatus(text) {
  const t = (text || '').toLowerCase();
  if (/\d+'\s*$|مباشر|live|\blive\b/i.test(t)) return 'live';
  if (/انته|ended|ft|نهاية|انتهت/i.test(t)) return 'ended';
  return 'upcoming';
}
function parseScore(raw) {
  const m = raw.match(/(\d+)\s*[-–]\s*(\d+)/);
  return m ? { a: m[1], b: m[2] } : { a: '', b: '' };
}
function normTime(raw) {
  const m = raw.match(/(\d{1,2}):(\d{2})\s*(AM|PM|ص|م)?/i);
  if (!m) return raw.replace(/لم تبدأ|بعد قليل/g,'').trim();
  let h = parseInt(m[1]), min = m[2];
  const ap = (m[3]||'').toUpperCase();
  if (ap === 'PM' && h < 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const p = h >= 12 ? 'PM' : 'AM';
  const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return String(h12).padStart(2,'0') + ':' + min + ' ' + p;
}

function startCountdown() {
  countdown = 60;
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    countdown--;
    document.getElementById('refreshLabel').textContent =
      countdown > 0 ? 'Refreshing in ' + countdown + 's' : 'Refreshing…';
    if (countdown <= 0) { clearInterval(cdTimer); fetchMatches(); }
  }, 1000);
}

// ── CONTROLS ──────────────────────────────────────────────────
document.getElementById('reloadBtn').addEventListener('click', function() {
  guardActive = false;
  const ifrm = document.getElementById('videoIframe');
  if (ifrm && ifrm.src && ifrm.src !== 'about:blank') {
    document.getElementById('loadingOverlay').classList.remove('hidden');
    ifrm.classList.remove('show');
    ifrm.src = ifrm.src;
  }
  setTimeout(()=>{ guardActive = true; }, 500);
});
document.getElementById('fullscreenBtn').addEventListener('click', function() {
  guardActive = false;
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  setTimeout(()=>{ guardActive = true; }, 500);
});

function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }
document.getElementById('menuBtn').addEventListener('click', ()=> document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar());
document.getElementById('backdrop').addEventListener('click', closeSidebar);

// ── FULL KEYBOARD / REMOTE NAVIGATION ────────────────────────
// tv-nav.js handles spatial navigation across ALL focusable elements
// (topbar buttons, home link, tabs, match cards).
// We layer on top only the tab-switch shortcut: when focus is on a
// match card, Left/Right switches between Live and Upcoming tabs.
(function() {
  // Make sure sb-tab buttons are keyboard-focusable
  document.querySelectorAll('.sb-tab').forEach(function(btn) {
    if (!btn.hasAttribute('tabindex')) btn.setAttribute('tabindex', '0');
  });

  function firstCard() {
    return document.querySelector('#matchesScroll .mcard:not(.no-stream)');
  }
  function isOnTab(el) {
    return el && (el.classList.contains('sb-tab') || el.classList.contains('sb-home-btn'));
  }
  function isOnCard(el) {
    return el && el.classList.contains('mcard');
  }

  document.addEventListener('keydown', function(e) {
    var active = document.activeElement;

    // ↓ from any sidebar tab/home button → jump into first card
    if (e.key === 'ArrowDown' && isOnTab(active)) {
      var card = firstCard();
      if (card) {
        e.stopImmediatePropagation();
        e.preventDefault();
        card.focus();
        card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      return;
    }

    // ↑ from first card → jump back to the active tab button
    if (e.key === 'ArrowUp' && isOnCard(active)) {
      var cards = document.querySelectorAll('#matchesScroll .mcard:not(.no-stream)');
      if (cards.length && cards[0] === active) {
        e.stopImmediatePropagation();
        e.preventDefault();
        var activeTab = document.querySelector('.sb-tab.active') || document.getElementById('tabLive');
        activeTab.focus();
      }
      return;
    }

    // ← / → while on a card → switch tabs and focus first card
    if (isOnCard(active)) {
      if (e.key === 'ArrowLeft') {
        e.stopImmediatePropagation();
        e.preventDefault();
        showTab('live');
        setTimeout(function() {
          var f = firstCard();
          if (f) f.focus(); else document.getElementById('tabLive').focus();
        }, 30);
      } else if (e.key === 'ArrowRight') {
        e.stopImmediatePropagation();
        e.preventDefault();
        showTab('upcoming');
        setTimeout(function() {
          var f = firstCard();
          if (f) f.focus(); else document.getElementById('tabUp').focus();
        }, 30);
      }
    }
  }, true); // capture phase — runs before tv-nav.js
})();

// ── BOOT ──────────────────────────────────────────────────────
fetchMatches();
</script>
