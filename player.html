<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var ua = navigator.userAgent || '';
  var isTV = /SmartTV|SMART-TV|Tizen|WebOS|Web0S|NetCast|HbbTV|BRAVIA|AFT[A-Z]|GoogleTV|AppleTV|CrKey|Roku|Vidaa|VIDAA|Hisense|PHILIPSTV|InettvBrowser|POV_TV|NETTV/i.test(ua);
  if(!isTV){
    try{
      var bigNoTouch = window.matchMedia('(min-width: 1800px)').matches && navigator.maxTouchPoints === 0 && !('ontouchstart' in window);
      if(bigNoTouch) isTV = true;
    }catch(e){}
  }
  if(isTV) document.documentElement.classList.add('tv-mode');
})();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Koora Live">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>beIN Sport MAX</title>
<style>
  :root {
    --border: rgba(255,255,255,0.14);
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
    --accent: #ff3b30;
    --green: #30d158;
    --panel: #121214;
    --panel-2: #1a1b1e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  .bg-glow { display: none; }
  .app { display: flex; height: 100dvh; width: 100dvw; position: relative; z-index: 1; }

  .sidebar { width: 300px; min-width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.2s ease; z-index: 20; flex-shrink: 0; }

  .back-link { display: flex; align-items: center; gap: 6px; padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 13px; text-decoration: none; }
  .back-link:hover { color: var(--text); }
  .back-arrow { width: 26px; height: 26px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; }

  .sidebar-header { padding: 18px 18px 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .logo-pill { width: 40px; height: 40px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .brand-info h1 { font-size: 15px; font-weight: 600; }
  .brand-info span { font-size: 11px; color: var(--muted); }

  .playlist { flex: 1; overflow-y: auto; padding: 12px 10px; display: flex; flex-direction: column; gap: 6px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; -webkit-overflow-scrolling: touch; }
  .playlist::-webkit-scrollbar { width: 4px; }
  .playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .channel { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 14px; background: var(--panel-2); border: 1px solid transparent; cursor: pointer; transition: background 0.15s ease; position: relative; overflow: hidden; }
  .channel:hover { background: rgba(255,255,255,0.08); }
  .channel.active { background: rgba(255,59,48,0.14); border-color: rgba(255,59,48,0.4); }
  .channel.active .ch-badge { background: var(--accent); color: #fff; border-color: rgba(255,59,48,0.5); }

  .ch-badge { width: 40px; height: 40px; border-radius: 11px; background: var(--panel-2); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; transition: background 0.2s; }

  .ch-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .ch-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-sub { font-size: 11px; color: var(--muted); }

  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); opacity: 0; flex-shrink: 0; }

  .ch-badge-4k { background: linear-gradient(135deg, #7c3aed, #a855f7) !important; color: #fff !important; border-color: rgba(168,85,247,0.5) !important; font-size: 10px !important; letter-spacing: 0.5px; }
  .channel.active .ch-badge-4k { background: linear-gradient(135deg, #6d28d9, #9333ea) !important; }
  .badge-4k-label { display: inline-block; font-size: 9px; font-weight: 800; letter-spacing: 1px; }
  .channel.active .live-dot { opacity: 1; }

  .sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: max(14px, env(safe-area-inset-top)) 20px 14px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .glass-btn { height: 36px; border-radius: 11px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; font-size: 15px; padding: 0 12px; gap: 6px; white-space: nowrap; }
  .glass-btn.icon-only { width: 36px; padding: 0; }
  .glass-btn:hover { background: rgba(255,255,255,0.12); }
  .glass-btn:active { opacity: 0.8; }

  .menu-btn { display: none; }

  .now-playing h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
  .live-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; padding: 4px 10px; border-radius: 20px; background: rgba(255,59,48,0.15); color: #ff6b6b; border: 1px solid rgba(255,59,48,0.35); }

  .controls { display: flex; gap: 8px; }

  .player-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #000; position: relative; }

  .player-frame { width: 100%; height: 100%; max-width: 1500px; border-radius: 14px; overflow: hidden; background: #000; border: 1px solid var(--border); position: relative; opacity: 0; transition: opacity 0.25s ease; }
  .player-frame.show { opacity: 1; }
  .player-frame iframe { width: 100%; height: 100%; border: 0; display: block; }

  .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: #0a0a0c; z-index: 5; transition: opacity 0.2s ease; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .spinner-ring { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }

  .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 15; }

  @media (max-width: 860px) {
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .backdrop.show { display: block; }
    .menu-btn { display: flex; }
    .player-wrap { padding: 12px; }
    .player-frame { border-radius: 10px; }
    .topbar { padding: max(14px, env(safe-area-inset-top)) 14px 14px; }
  }
  
  /* ── AUTO-REFRESH OVERLAY ── */
  #autoRefreshOverlay {
    display:none; position:absolute; inset:0; z-index:10;
    background:rgba(0,0,0,0.82); align-items:center; justify-content:center;
    flex-direction:column; gap:14px; text-align:center; padding:24px; border-radius:inherit;
  }
  #autoRefreshOverlay.show { display:flex; }
  .ar-icon  { font-size:38px; }
  .ar-title { font-size:16px; font-weight:600; color:#fff; }
  .ar-sub   { font-size:13px; color:rgba(255,255,255,0.5); }
  .ar-countdown {
    font-size:36px; font-weight:700;
    width:68px; height:68px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .ar-actions { display:flex; gap:10px; margin-top:4px; }
  .ar-btn-now {
    padding:9px 20px; border-radius:10px; border:none;
    color:#fff; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer;
  }
  .ar-btn-now:hover { opacity:.85; }
  .ar-btn-cancel {
    padding:9px 20px; border-radius:10px;
    background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18);
    color:#fff; font-size:13px; font-family:inherit; cursor:pointer;
  }
  .ar-btn-cancel:hover { background:rgba(255,255,255,0.18); }

  :focus-visible, .channel:focus, .glass-btn:focus, .card:focus, .team-btn:focus, .watch-btn:focus, .dd-item:focus, .back-link:focus { outline: 2px solid #ff3b30 !important; outline-offset: 2px; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="app">

  <div class="backdrop" id="backdrop"></div>

  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="back-link">
      <div class="back-arrow">←</div>
      Back to Home
    </a>
    <div class="sidebar-header">
      <div class="logo-pill">📡</div>
      <div class="brand-info">
        <h1>beIN Sport MAX</h1>
        <span>Live Channel Playlist</span>
      </div>
    </div>
    <div class="playlist" id="playlist"></div>
    <div class="sidebar-footer" id="footerCount">5 channels · Streaming live</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="glass-btn icon-only menu-btn" id="menuBtn" aria-label="Menu">☰</button>
        <div class="now-playing">
          <h2 id="channelTitle">beIN Sport Max 1</h2>
          <span class="live-badge">LIVE</span>
        </div>
      </div>
      <div class="controls">
        <button class="glass-btn icon-only" id="reloadBtn" title="Reload">⟳</button>
        <button class="glass-btn icon-only" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="player-wrap">
      <div class="player-frame" id="playerFrame">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner-ring"></div>
          <div class="loading-text">Loading stream…</div>
        </div>
        <iframe
          id="videoIframe"
          src=""
          allowfullscreen
          webkit-allowfullscreen
          playsinline
          webkit-playsinline
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          referrerpolicy="no-referrer">
        </iframe>
      </div>
    </div>
  </main>

</div>

<script>
  // Disarm ad-shield on intentional navigation
  document.querySelectorAll('.back-link, #reloadBtn, #fullscreenBtn, #menuBtn').forEach(function (el) {
    el.addEventListener('click', function () { if (window.adShieldDisarm) window.adShieldDisarm(); }, true);
  });

  const channels = [
    { name: "beIN Sport Max 1", sub: "Live Channel", code: "M1", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWUxNKy9tUnFBdlFpWlNSeGIxakpjLw~~" },
    { name: "beIN Sport Max 2", sub: "Live Channel", code: "M2", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWVc1OENxMkE1Q1RsZDNHWnRMKzVjRA~~" },
    { name: "beIN Sport Max 3", sub: "Live Channel", code: "M3", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVYndkT3RiWHNiVlVYTHRiOG4rQUlNcA~~" },
    { name: "beIN Sport Max 4", sub: "Live Channel", code: "M4", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWmNpMmpoZktrYTJOY25Ha0s5SzRuQg~~" },
    { name: "beIN Sport Max 4K", sub: "4K Live Channel", code: "4K", url: "__4K__", is4k: true }
  ];

  const playlistEl = document.getElementById('playlist');
  const iframe     = document.getElementById('videoIframe');
  const frame      = document.getElementById('playerFrame');
  const loading    = document.getElementById('loadingOverlay');
  const title      = document.getElementById('channelTitle');
  const sidebar    = document.getElementById('sidebar');
  const backdrop   = document.getElementById('backdrop');
  let active = 0;

  function render() {
    playlistEl.innerHTML = '';
    channels.forEach((ch, i) => {
      const el = document.createElement('div');
      el.className = 'channel' + (i === active ? ' active' : '');
      el.innerHTML = `
        <div class="ch-badge${ch.is4k ? ' ch-badge-4k' : ''}">${ch.is4k ? '<span class="badge-4k-label">4K</span>' : ch.code}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-sub">${ch.sub}</div>
        </div>
        <div class="live-dot"></div>`;
      el.addEventListener('click', () => pick(i));
      playlistEl.appendChild(el);
    });
  }

  function pick(i) {
    active = i; render(); load(i);
    if (window.innerWidth <= 860) closeSidebar();
  }

  const IFRAME_4K = `<iframe src="https://xyzstreams.st/wc-10-embed.html" width="100%" height="100%" frameborder="0" scrolling="no" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>`;

  function load(i) {
    const ch = channels[i];
    title.textContent = ch.name;
    loading.classList.remove('hidden');
    frame.classList.remove('show');
    const oldEl = document.getElementById('videoIframe');

    if (ch.is4k) {
      // Inject the 4K embed directly into a wrapper div
      const wrapper = document.createElement('div');
      wrapper.id = 'videoIframe';
      wrapper.style.cssText = 'width:100%;height:100%;display:block;';
      wrapper.innerHTML = IFRAME_4K;
      oldEl.replaceWith(wrapper);
      setTimeout(() => { loading.classList.add('hidden'); frame.classList.add('show'); }, 600);
      return;
    }

    const newIframe = document.createElement('iframe');
    newIframe.id = 'videoIframe';
    newIframe.allowFullscreen = true;
    newIframe.setAttribute('webkit-allowfullscreen', '');
    newIframe.setAttribute('playsinline', '');
    newIframe.setAttribute('webkit-playsinline', '');
    newIframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
    newIframe.setAttribute('referrerpolicy', 'no-referrer');
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (!isIOS) {
      newIframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation allow-forms');
    }
    newIframe.style.cssText = 'width:100%;height:100%;border:0;display:block;';
    newIframe.addEventListener('load', onIframeLoad);
    oldEl.replaceWith(newIframe);
    newIframe.src = ch.url;
  }
  function onIframeLoad() {
    setTimeout(() => { loading.classList.add('hidden'); frame.classList.add('show'); }, 300);
    if (window.arHeartbeat) window.arHeartbeat();
  }
  document.getElementById('videoIframe').addEventListener('load', onIframeLoad);

  // Start watchdog after each channel load
  const _origLoad = load;
  load = function(i) { _origLoad(i); setTimeout(function(){ if(window.arStart) window.arStart(); }, 1500); };

  document.getElementById('reloadBtn').addEventListener('click', () => load(active));
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  });

  function openSidebar()  { sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('show'); }

  document.getElementById('menuBtn').addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
  backdrop.addEventListener('click', closeSidebar);

  render();
  load(active);

/* ── AUTO-REFRESH WATCHDOG ── */
(function(){
  var AR_SILENCE  = 30000;   // ms quiet before overlay appears
  var AR_SECS     = 10;      // countdown seconds

  var _active     = false;
  var _silTimer   = null;
  var _cdTimer    = null;
  var _cdVal      = AR_SECS;
  var _accentColor = getComputedStyle(document.documentElement)
                      .getPropertyValue('--blue').trim() ||
                     getComputedStyle(document.documentElement)
                      .getPropertyValue('--accent').trim() || '#0a84ff';

  /* inject HTML */
  var frame = document.getElementById('playerFrame');
  if (frame) {
    var ov = document.createElement('div');
    ov.id = 'autoRefreshOverlay';
    ov.innerHTML =
      '<div class="ar-icon">📡</div>' +
      '<div class="ar-title">Stream paused or stopped</div>' +
      '<div class="ar-sub">Reloading automatically in…</div>' +
      '<div class="ar-countdown" id="arCountdown" style="color:' + _accentColor + ';border:3px solid ' + _accentColor + '44">10</div>' +
      '<div class="ar-actions">' +
        '<button class="ar-btn-now" style="background:' + _accentColor + '" onclick="arReloadNow()">↺ Reload Now</button>' +
        '<button class="ar-btn-cancel" onclick="arCancel()">✕ Cancel</button>' +
      '</div>';
    frame.appendChild(ov);
  }

  function arHide() {
    clearInterval(_cdTimer);
    var ov = document.getElementById('autoRefreshOverlay');
    if (ov) ov.classList.remove('show');
  }

  function arTrigger() {
    if (!_active) return;
    var ov = document.getElementById('autoRefreshOverlay');
    var cd = document.getElementById('arCountdown');
    if (!ov || !cd) return;
    _cdVal = AR_SECS;
    cd.textContent = _cdVal;
    ov.classList.add('show');
    clearInterval(_cdTimer);
    _cdTimer = setInterval(function(){
      _cdVal--;
      cd.textContent = _cdVal;
      if (_cdVal <= 0) { clearInterval(_cdTimer); arReloadNow(); }
    }, 1000);
  }

  window.arReloadNow = function() {
    arHide();
    var ifrm = document.getElementById('videoIframe');
    if (!ifrm) return;
    var lo = document.getElementById('loadingOverlay');
    var pf = document.getElementById('playerFrame');
    if (lo) lo.classList.remove('hidden');
    if (pf) { pf.classList.remove('show'); }
    /* for the case where the iframe element itself has .show */
    ifrm.classList && ifrm.classList.remove('show');
    var src = ifrm.src;
    if (src && src !== 'about:blank' && src !== '') {
      ifrm.src = '';
      setTimeout(function(){ ifrm.src = src; arReset(); }, 150);
    }
  };

  window.arCancel = function() {
    arHide();
    clearTimeout(_silTimer);
    _silTimer = setTimeout(arTrigger, AR_SILENCE * 2);
  };

  function arReset() {
    clearTimeout(_silTimer);
    arHide();
    if (!_active) return;
    _silTimer = setTimeout(arTrigger, AR_SILENCE);
  }

  window.arStart = function() { _active = true; arReset(); };
  window.arStop  = function() { _active = false; clearTimeout(_silTimer); arHide(); };
  window.arHeartbeat = arReset;   /* call on every iframe load event */

  /* Observe iframe load events via MutationObserver + polling */
  function watchIframe() {
    var ifrm = document.getElementById('videoIframe');
    if (!ifrm) return;
    ifrm.addEventListener('load', function(){ if (_active) arReset(); });
  }
  /* Re-attach whenever the iframe element is replaced in the DOM */
  var obs = new MutationObserver(function(muts){
    muts.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if (n.id === 'videoIframe') {
          n.addEventListener('load', function(){ if (_active) arReset(); });
        }
      });
    });
  });
  var pf2 = document.getElementById('playerFrame');
  if (pf2) obs.observe(pf2, { childList: true, subtree: true });
  watchIframe();
})();

</script>
<script src="ad-shield.js"></script>
<script src="tv-nav.js"></script>
</body>
</html>
