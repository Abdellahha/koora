<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beIN Sports Player</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151c;
    --panel2:#181c25;
    --accent:#ff3b3b;
    --accent2:#ff7a3b;
    --text:#eef0f4;
    --muted:#8a90a0;
    --border:rgba(255,255,255,0.07);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:radial-gradient(circle at 20% -10%, #1a1f2b 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
  }
  .app{
    display:flex;
    height:100vh;
    width:100vw;
  }

  /* Sidebar */
  .sidebar{
    width:320px;
    min-width:260px;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    z-index:10;
  }
  .sidebar-header{
    padding:24px 20px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid var(--border);
  }
  .logo{
    width:38px;
    height:38px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:14px;
    box-shadow:0 4px 14px rgba(255,59,59,0.35);
    flex-shrink:0;
  }
  .brand h1{
    font-size:16px;
    margin:0;
    letter-spacing:.3px;
  }
  .brand span{
    font-size:12px;
    color:var(--muted);
  }

  .playlist{
    flex:1;
    overflow-y:auto;
    padding:14px 12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .playlist::-webkit-scrollbar{width:6px;}
  .playlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12); border-radius:6px;}

  .channel{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(255,255,255,0.02);
    border:1px solid transparent;
    cursor:pointer;
    transition:background .25s ease, transform .2s ease, border-color .25s ease;
    position:relative;
    overflow:hidden;
  }
  .channel:hover{
    background:rgba(255,255,255,0.05);
    transform:translateX(2px);
  }
  .channel.active{
    background:linear-gradient(90deg, rgba(255,59,59,0.18), rgba(255,122,59,0.06));
    border-color:rgba(255,59,59,0.4);
  }
  .channel.active::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:4px;
    background:linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius:0 4px 4px 0;
  }
  .ch-icon{
    width:42px;
    height:42px;
    border-radius:10px;
    background:#1f2330;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:13px;
    color:#cfd3dd;
    flex-shrink:0;
    transition:transform .3s ease;
  }
  .channel.active .ch-icon{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
    transform:scale(1.05);
  }
  .ch-info{display:flex; flex-direction:column; gap:2px; min-width:0;}
  .ch-name{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ch-sub{font-size:11px; color:var(--muted);}

  .live-dot{
    margin-left:auto;
    width:8px;height:8px;
    border-radius:50%;
    background:#3ddc84;
    box-shadow:0 0 8px #3ddc84;
    opacity:0;
    transition:opacity .25s ease;
    flex-shrink:0;
  }
  .channel.active .live-dot{opacity:1; animation:pulse 1.6s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,.6);}
    70%{box-shadow:0 0 0 8px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }

  .sidebar-footer{
    padding:14px 18px;
    font-size:11px;
    color:var(--muted);
    border-top:1px solid var(--border);
  }

  /* Main */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 26px;
    border-bottom:1px solid var(--border);
    background:rgba(18,21,28,0.6);
    backdrop-filter:blur(8px);
  }
  .now-playing{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .now-playing h2{
    margin:0;
    font-size:18px;
    font-weight:700;
  }
  .badge{
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    background:rgba(255,59,59,0.15);
    color:var(--accent);
    border:1px solid rgba(255,59,59,0.3);
    font-weight:600;
    letter-spacing:.5px;
  }
  .menu-btn{
    display:none;
    width:38px;height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.04);
    color:var(--text);
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:18px;
  }

  .controls{
    display:flex;
    gap:10px;
  }
  .icon-btn{
    width:38px;height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.04);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .2s ease, transform .2s ease;
    font-size:15px;
  }
  .icon-btn:hover{
    background:rgba(255,255,255,0.1);
    transform:translateY(-1px);
  }

  .player-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:26px;
    position:relative;
  }
  .player-frame{
    width:100%;
    height:100%;
    max-width:1400px;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    box-shadow:0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);
    position:relative;
    opacity:0;
    transform:scale(.985);
    transition:opacity .45s ease, transform .45s ease;
  }
  .player-frame.show{
    opacity:1;
    transform:scale(1);
  }
  .player-frame iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
  }

  .loading-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#05060a;
    transition:opacity .35s ease;
    z-index:5;
  }
  .loading-overlay.hidden{
    opacity:0;
    pointer-events:none;
  }
  .spinner{
    width:46px;height:46px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:9;
  }

  @media (max-width: 860px){
    .sidebar{
      position:fixed;
      top:0; left:0; bottom:0;
      transform:translateX(-100%);
      box-shadow:10px 0 40px rgba(0,0,0,.5);
    }
    .sidebar.open{transform:translateX(0);}
    .menu-btn{display:flex;}
    .overlay.show{display:block;}
    .player-wrap{padding:14px;}
    .player-frame{border-radius:12px;}
    .topbar{padding:14px 16px;}
  }
</style>
</head>
<body>

<div class="app">

  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <a href="home.html" style="color:var(--muted); text-decoration:none; font-size:13px; display:flex; align-items:center; gap:6px; padding:10px 18px; border-bottom:1px solid var(--border); transition:color .2s ease;">← Back to Home</a>
    <div class="sidebar-header">
      <div class="logo">bN</div>
      <div class="brand">
        <h1>beIN Sports</h1>
        <span>Live Channel Playlist</span>
      </div>
    </div>
    <div class="playlist" id="playlist"></div>
    <div class="sidebar-footer">4 channels · Streaming live</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="now-playing">
          <h2 id="channelTitle">beIN Sport Max 1</h2>
          <span class="badge">LIVE</span>
        </div>
      </div>
      <div class="controls">
        <button class="icon-btn" id="reloadBtn" title="Reload">⟳</button>
        <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="player-wrap">
      <div class="player-frame" id="playerFrame">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
        </div>
        <iframe id="videoIframe" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-forms" referrerpolicy="no-referrer"></iframe>
      </div>
    </div>
  </main>

</div>

<script>
  // Block popups/popunders triggered indirectly from this page
  window.open = function(){ console.warn('Popup blocked'); return null; };

  const channels = [
    {
      name: "beIN Sport Max 1",
      sub: "Live Channel",
      code: "BS1",
      url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWUxNKy9tUnFBdlFpWlNSeGIxakpjLw~~"
    },
    {
      name: "beIN Sport Max 2",
      sub: "Live Channel",
      code: "BS2",
      url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWVc1OENxMkE1Q1RsZDNHWnRMKzVjRA~~"
    },
    {
      name: "beIN Sport Max 3",
      sub: "Live Channel",
      code: "BS3",
      url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVYndkT3RiWHNiVlVYTHRiOG4rQUlNcA~~"
    },
    {
      name: "beIN Sport Max 4",
      sub: "Live Channel",
      code: "BS4",
      url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWmNpMmpoZktrYTJOY25Ha0s5SzRuQg~~"
    }
  ];

  const playlistEl = document.getElementById('playlist');
  const iframe = document.getElementById('videoIframe');
  const playerFrame = document.getElementById('playerFrame');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const channelTitle = document.getElementById('channelTitle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  let activeIndex = 0;

  function renderPlaylist(){
    playlistEl.innerHTML = '';
    channels.forEach((ch, i) => {
      const div = document.createElement('div');
      div.className = 'channel' + (i === activeIndex ? ' active' : '');
      div.innerHTML = `
        <div class="ch-icon">${ch.code}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-sub">${ch.sub}</div>
        </div>
        <div class="live-dot"></div>
      `;
      div.addEventListener('click', () => selectChannel(i));
      playlistEl.appendChild(div);
    });
  }

  function selectChannel(i){
    if(i === activeIndex && iframe.src) { loadChannel(i); return; }
    activeIndex = i;
    renderPlaylist();
    loadChannel(i);
    if(window.innerWidth <= 860){ closeSidebar(); }
  }

  function loadChannel(i){
    const ch = channels[i];
    channelTitle.textContent = ch.name;
    loadingOverlay.classList.remove('hidden');
    playerFrame.classList.remove('show');
    iframe.src = 'about:blank';
    setTimeout(() => {
      iframe.src = ch.url;
    }, 150);
  }

  iframe.addEventListener('load', () => {
    if(iframe.src === 'about:blank') return;
    setTimeout(() => {
      loadingOverlay.classList.add('hidden');
      playerFrame.classList.add('show');
    }, 300);
  });

  document.getElementById('reloadBtn').addEventListener('click', () => loadChannel(activeIndex));
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if(playerFrame.requestFullscreen) playerFrame.requestFullscreen();
  });

  function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('show'); }
  function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }

  document.getElementById('menuBtn').addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  overlay.addEventListener('click', closeSidebar);

  renderPlaylist();
  loadChannel(activeIndex);
</script>

</body>
</html>
