<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Koora Live">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>beIN Sport MAX</title>
<style>
  :root {
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.16);
    --glass-active: rgba(255,255,255,0.13);
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
    --accent: #ff3b30;
    --accent-glow: rgba(255,59,48,0.35);
    --green: #30d158;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,59,48,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: flex;
    height: 100dvh;
    width: 100dvw;
    position: relative;
    z-index: 1;
  }

  .sidebar {
    width: 300px;
    min-width: 260px;
    background: rgba(10,10,12,0.85);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    z-index: 20;
    flex-shrink: 0;
  }

  .back-link {
    display: flex; align-items: center; gap: 6px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--glass-border);
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }
  .back-arrow {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .sidebar-header {
    padding: 18px 18px 14px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--glass-border);
  }

  .logo-pill {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: linear-gradient(145deg, rgba(255,59,48,0.6), rgba(255,59,48,0.25));
    border: 1px solid rgba(255,59,48,0.4);
    box-shadow: 0 4px 16px rgba(255,59,48,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .brand-info h1 { font-size: 15px; font-weight: 600; }
  .brand-info span { font-size: 11px; color: var(--muted); }

  .playlist {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
    -webkit-overflow-scrolling: touch;
  }
  .playlist::-webkit-scrollbar { width: 4px; }
  .playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .channel {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.22s ease, transform 0.2s ease, border-color 0.22s ease;
    position: relative; overflow: hidden;
  }
  .channel:hover { background: rgba(255,255,255,0.06); transform: translateX(3px); }
  .channel.active {
    background: linear-gradient(105deg, rgba(255,59,48,0.18), rgba(255,59,48,0.06));
    border-color: rgba(255,59,48,0.35);
    box-shadow: 0 0 0 1px rgba(255,59,48,0.1) inset;
  }
  .channel.active .ch-badge {
    background: linear-gradient(135deg, rgba(255,59,48,0.8), rgba(255,100,60,0.6));
    color: #fff;
    border-color: rgba(255,59,48,0.5);
    box-shadow: 0 4px 12px rgba(255,59,48,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .ch-badge {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--muted);
    flex-shrink: 0;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .ch-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .ch-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-sub { font-size: 11px; color: var(--muted); }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    opacity: 0; flex-shrink: 0;
    transition: opacity 0.25s;
  }
  .channel.active .live-dot { opacity: 1; animation: pulse 1.8s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(48,209,88,0.6); }
    70% { box-shadow: 0 0 0 7px rgba(48,209,88,0); }
    100% { box-shadow: 0 0 0 0 rgba(48,209,88,0); }
  }

  .sidebar-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--glass-border);
    font-size: 11px; color: var(--muted);
  }

  .main {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 20px 14px;
    background: rgba(10,10,12,0.7);
    backdrop-filter: blur(30px) saturate(160%);
    -webkit-backdrop-filter: blur(30px) saturate(160%);
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .glass-btn {
    height: 36px;
    border-radius: 11px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    font-size: 15px;
    padding: 0 12px;
    gap: 6px;
    white-space: nowrap;
  }
  .glass-btn.icon-only { width: 36px; padding: 0; }
  .glass-btn:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .glass-btn:active { transform: scale(0.95); }

  .menu-btn { display: none; }

  .now-playing h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
  .live-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(255,59,48,0.15); color: #ff6b6b;
    border: 1px solid rgba(255,59,48,0.35);
  }

  .controls { display: flex; gap: 8px; }

  .player-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: radial-gradient(ellipse at center, #0a0a0f 0%, #000 80%);
    position: relative;
  }

  .player-frame {
    width: 100%; height: 100%;
    max-width: 1500px;
    border-radius: 18px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 25px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    position: relative;
    opacity: 0;
    transform: scale(0.985);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .player-frame.show { opacity: 1; transform: scale(1); }

  .player-frame iframe {
    width: 100%; height: 100%;
    border: 0; display: block;
  }

  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    background: rgba(5,5,8,0.95);
    backdrop-filter: blur(20px);
    z-index: 5;
    transition: opacity 0.35s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .spinner-ring {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent);
    animation: spin 0.85s linear infinite;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }

  .backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 15;
  }

  @media (max-width: 860px) {
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      box-shadow: 12px 0 50px rgba(0,0,0,0.6);
    }
    .sidebar.open { transform: translateX(0); }
    .backdrop.show { display: block; }
    .menu-btn { display: flex; }
    .player-wrap { padding: 12px; }
    .player-frame { border-radius: 14px; }
    .topbar { padding: max(14px, env(safe-area-inset-top)) 14px 14px; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="app">

  <div class="backdrop" id="backdrop"></div>

  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="back-link">
      <div class="back-arrow">←</div>
      Back to Home
    </a>
    <div class="sidebar-header">
      <div class="logo-pill">📡</div>
      <div class="brand-info">
        <h1>beIN Sport MAX</h1>
        <span>Live Channel Playlist</span>
      </div>
    </div>
    <div class="playlist" id="playlist"></div>
    <div class="sidebar-footer" id="footerCount">4 channels · Streaming live</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="glass-btn icon-only menu-btn" id="menuBtn" aria-label="Menu">☰</button>
        <div class="now-playing">
          <h2 id="channelTitle">beIN Sport Max 1</h2>
          <span class="live-badge">LIVE</span>
        </div>
      </div>
      <div class="controls">
        <button class="glass-btn icon-only" id="reloadBtn" title="Reload">⟳</button>
        <button class="glass-btn icon-only" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="player-wrap">
      <div class="player-frame" id="playerFrame">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner-ring"></div>
          <div class="loading-text">Loading stream…</div>
        </div>
        <iframe
          id="videoIframe"
          src=""
          allowfullscreen
          webkit-allowfullscreen
          playsinline
          webkit-playsinline
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          referrerpolicy="no-referrer">
        </iframe>
      </div>
    </div>
  </main>

</div>

<script>
  const _origOpen = window.open.bind(window);
  window.open = function(url, name, features) {
    if (!url) return null;
    const allowed = ['ntv.cx','ntvs.cx','youtube.com','youtu.be'];
    try {
      const host = new URL(url).hostname.replace(/^www\./, '');
      if (allowed.some(d => host === d || host.endsWith('.'+d))) return null;
    } catch(e) {}
    console.warn('Popup blocked:', url);
    return null;
  };

  document.addEventListener('click', function(e) {
    const a = e.target.closest('a');
    if (a && a.target === '_blank') { e.preventDefault(); e.stopPropagation(); }
  }, true);

  const channels = [
    { name: "beIN Sport Max 1", sub: "Live Channel", code: "M1", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWUxNKy9tUnFBdlFpWlNSeGIxakpjLw~~" },
    { name: "beIN Sport Max 2", sub: "Live Channel", code: "M2", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWVc1OENxMkE1Q1RsZDNHWnRMKzVjRA~~" },
    { name: "beIN Sport Max 3", sub: "Live Channel", code: "M3", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVYndkT3RiWHNiVlVYTHRiOG4rQUlNcA~~" },
    { name: "beIN Sport Max 4", sub: "Live Channel", code: "M4", url: "https://www.ntvs.cx/embed?t=OThTUzhFbk9WeExodUtsTmV0cFgxK2wrTHpQQjNWZVFQV09meFQ4YlhVWmNpMmpoZktrYTJOY25Ha0s5SzRuQg~~" }
  ];

  const playlistEl = document.getElementById('playlist');
  const iframe     = document.getElementById('videoIframe');
  const frame      = document.getElementById('playerFrame');
  const loading    = document.getElementById('loadingOverlay');
  const title      = document.getElementById('channelTitle');
  const sidebar    = document.getElementById('sidebar');
  const backdrop   = document.getElementById('backdrop');
  let active = 0;

  function render() {
    playlistEl.innerHTML = '';
    channels.forEach((ch, i) => {
      const el = document.createElement('div');
      el.className = 'channel' + (i === active ? ' active' : '');
      el.innerHTML = `
        <div class="ch-badge">${ch.code}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-sub">${ch.sub}</div>
        </div>
        <div class="live-dot"></div>`;
      el.addEventListener('click', () => pick(i));
      playlistEl.appendChild(el);
    });
  }

  function pick(i) {
    active = i; render(); load(i);
    if (window.innerWidth <= 860) closeSidebar();
  }

  function load(i) {
    const ch = channels[i];
    title.textContent = ch.name;
    loading.classList.remove('hidden');
    frame.classList.remove('show');
    const old = document.getElementById('videoIframe');
    const newIframe = document.createElement('iframe');
    newIframe.id = 'videoIframe';
    newIframe.allowFullscreen = true;
    newIframe.setAttribute('webkit-allowfullscreen', '');
    newIframe.setAttribute('playsinline', '');
    newIframe.setAttribute('webkit-playsinline', '');
    newIframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
    newIframe.setAttribute('referrerpolicy', 'no-referrer');
    newIframe.style.cssText = 'width:100%;height:100%;border:0;display:block;';
    newIframe.addEventListener('load', onIframeLoad);
    old.replaceWith(newIframe);
    newIframe.src = ch.url;
  }
  function onIframeLoad() {
    setTimeout(() => { loading.classList.add('hidden'); frame.classList.add('show'); }, 300);
  }
  document.getElementById('videoIframe').addEventListener('load', onIframeLoad);

  document.getElementById('reloadBtn').addEventListener('click', () => load(active));
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  });

  function openSidebar()  { sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('show'); }

  document.getElementById('menuBtn').addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
  backdrop.addEventListener('click', closeSidebar);

  render();
  load(active);
</script>
</body>
</html>
