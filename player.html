<style>
  :root {
    --border: rgba(255,255,255,0.14);
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
    --accent: #ff3b30;
    --green: #30d158;
    --panel: #121214;
    --panel-2: #1a1b1e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  .bg-glow { display: none; }
  .app { display: flex; height: 100dvh; width: 100dvw; position: relative; z-index: 1; }

  .sidebar { width: 300px; min-width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.2s ease; z-index: 20; flex-shrink: 0; }

  .back-link { display: flex; align-items: center; gap: 6px; padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 13px; text-decoration: none; }
  .back-link:hover { color: var(--text); }
  .back-arrow { width: 26px; height: 26px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; }

  .sidebar-header { padding: 18px 18px 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .logo-pill { width: 40px; height: 40px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .brand-info h1 { font-size: 15px; font-weight: 600; }
  .brand-info span { font-size: 11px; color: var(--muted); }

  /* Slid filter styles (ALL section removed) */
  .filter-wrapper { padding: 10px 14px 6px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .filter-slider { display: flex; background: var(--panel-2); padding: 3px; border-radius: 10px; border: 1px solid var(--border); position: relative; }
  .filter-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 6px 0; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; text-align: center; }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; }

  .playlist { flex: 1; overflow-y: auto; padding: 12px 10px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; -webkit-overflow-scrolling: touch; }
  .playlist::-webkit-scrollbar { width: 4px; }
  .playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Channel buttons styled taller with text-wrapping allowed */
  .channel { display: flex; align-items: center; gap: 12px; padding: 16px 14px; min-height: 80px; border-radius: 14px; background: var(--panel-2); border: 1px solid transparent; cursor: pointer; transition: background 0.15s ease; position: relative; overflow: visible; }
  .channel:hover { background: rgba(255,255,255,0.08); }
  .channel.active { background: rgba(255,59,48,0.14); border-color: rgba(255,59,48,0.4); }
  .channel.active .ch-badge { border-color: rgba(255,59,48,0.5); }

  .ch-badge { width: 40px; height: 40px; border-radius: 11px; background: var(--panel-2); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; overflow: hidden; position: relative; }
  .ch-badge img { width: 100%; height: 100%; object-fit: contain; }

  .ch-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1; }
  .ch-name { font-size: 13px; font-weight: 600; line-height: 1.4; white-space: normal; word-break: break-word; }
  .ch-sub { font-size: 11px; color: var(--muted); line-height: 1.3; white-space: normal; word-break: break-word; }

  /* Quality Badge Styles */
  .quality-badge { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: auto; flex-shrink: 0; align-self: center; }
  .badge-4k { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; }
  .badge-hd { background: rgba(255,255,255,0.15); color: #fff; }
  .badge-sd { background: rgba(255,255,255,0.08); color: var(--muted); }

  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); opacity: 0; flex-shrink: 0; align-self: center; }
  .channel.active .live-dot { opacity: 1; }

  .sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: max(14px, env(safe-area-inset-top)) 20px 14px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .glass-btn { height: 36px; border-radius: 11px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; font-size: 15px; padding: 0 12px; gap: 6px; white-space: nowrap; }
  .glass-btn.icon-only { width: 36px; padding: 0; }
  .glass-btn:hover { background: rgba(255,255,255,0.12); }
  .glass-btn:active { opacity: 0.8; }

  .menu-btn { display: none; }

  .now-playing h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .live-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; padding: 4px 10px; border-radius: 20px; background: rgba(255,59,48,0.15); color: #ff6b6b; border: 1px solid rgba(255,59,48,0.35); }

  .controls { display: flex; gap: 8px; }

  .player-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #000; position: relative; overflow: hidden; }

  /* Player frame adjusted to beautifully scale and maintain 16:9 on desktop monitors */
  .player-frame { position: relative; width: 100%; aspect-ratio: 16 / 9; max-height: 100%; max-width: 100%; border-radius: 14px; overflow: hidden; background: #000; border: 1px solid var(--border); opacity: 0; transition: opacity 0.25s ease; }
  .player-frame.show { opacity: 1; }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }

  /* YouTube style custom controls overlay */
  .yt-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0, 0, 0, 0.85)); padding: 12px 16px 14px; z-index: 10; display: flex; flex-direction: column; gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease-in-out; }
  .player-frame:hover .yt-controls, .yt-controls:focus-within { opacity: 1; pointer-events: auto; }

  /* Red timeline at top of the bar */
  .yt-progress-container { width: 100%; height: 3px; background: rgba(255,255,255,0.2); position: relative; }
  .yt-progress-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 100%; background: var(--accent); }

  .yt-control-row { display: flex; align-items: center; justify-content: space-between; }
  .yt-left-controls, .yt-right-controls { display: flex; align-items: center; gap: 14px; }
  
  .yt-btn { background: transparent; border: none; color: #fff; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0; border-radius: 50%; transition: background 0.15s, transform 0.1s; }
  .yt-btn:hover { background: rgba(255,255,255,0.15); }
  .yt-btn:active { transform: scale(0.95); }
  .yt-btn svg { width: 22px; height: 22px; }

  /* Youtube volume slider transition (shows up on hover) */
  .yt-volume-wrapper { display: flex; align-items: center; }
  .yt-volume-slider { -webkit-appearance: none; width: 0; height: 3px; background: #fff; outline: none; border-radius: 2px; opacity: 0; transition: width 0.2s ease, opacity 0.2s ease; margin-left: 4px; cursor: pointer; }
  .yt-volume-wrapper:hover .yt-volume-slider, .yt-volume-slider:focus { width: 60px; opacity: 1; }
  .yt-volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #fff; cursor: pointer; }

  /* Glowing red LIVE icon badge */
  .yt-live-indicator { color: #e5e5e5; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; }
  .yt-live-dot { width: 6px; height: 6px; background: #f00; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #f00; }

  .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: #0a0a0c; z-index: 5; transition: opacity 0.2s ease; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .spinner-ring { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }

  .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 15; }

  @media (max-width: 860px) {
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .backdrop.show { display: block; }
    .menu-btn { display: flex; }
    .player-wrap { padding: 12px; }

    .now-playing h2 { max-width: 160px; }
    .yt-controls { opacity: 1; pointer-events: auto; }

<script>
  // Disarm ad-shield on intentional navigation
  document.querySelectorAll('.back-link, #reloadBtn, #fullscreenBtn, #menuBtn').forEach(function (el) {
    el.addEventListener('click', function () { if (window.adShieldDisarm) window.adShieldDisarm(); }, true);
  });

  // Client-side parser configured specifically for "MAX" streams
  function parseM3U(m3uRawText) {
    const lines = m3uRawText.split('\n');
    const parsedChannels = [];
    let currentCh = null;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      if (line.startsWith('#EXTINF:')) {
        currentCh = {};
        
        // Extract tvg-logo
        const logoMatch = line.match(/tvg-logo="([^"]*)"/);
        currentCh.logo = (logoMatch && logoMatch[1]) ? logoMatch[1] : "";

        // Extract tvg-name
        const nameAttrMatch = line.match(/tvg-name="([^"]*)"/);
        currentCh.nameAttr = (nameAttrMatch && nameAttrMatch[1]) ? nameAttrMatch[1] : "";

        // Extract group-title
        const groupMatch = line.match(/group-title="([^"]*)"/);
        currentCh.sub = (groupMatch && groupMatch[1]) ? groupMatch[1] : "Live Channel";

        // Extract clean channel name (after the last comma)
        const commaIdx = line.lastIndexOf(',');
        if (commaIdx !== -1) {
          currentCh.name = line.substring(commaIdx + 1).trim();
        } else {
          currentCh.name = "Unknown Channel";
        }

        // Determine quality category
        const searchContext = (currentCh.name + " " + currentCh.nameAttr + " " + currentCh.sub).toLowerCase();
        let quality = 'HD'; // default fallback
        
        if (searchContext.includes('4k') || searchContext.includes('⁴ᴷ') || searchContext.includes('uhd') || searchContext.includes('uᴴᵈ') || searchContext.includes('ultra')) {
          quality = '4K';
        } else if (searchContext.includes('sd') || searchContext.includes('ˢ🇩') || searchContext.includes('ˢᵈ')) {
          quality = 'SD';
        } else if (searchContext.includes('hd') || searchContext.includes('ᴴᵈ') || searchContext.includes('fhd') || searchContext.includes('hevc')) {
          quality = 'HD';
        }
        
        currentCh.quality = quality;

      } else if (line.startsWith('http://') || line.startsWith('https://')) {
        if (currentCh) {
          currentCh.url = line;
          
          // Strict filtration checking: restrict exclusively to MAX channels
          const isMaxChannel = currentCh.name.toLowerCase().includes('max') || 
                               currentCh.nameAttr.toLowerCase().includes('max');
          if (isMaxChannel) {
            parsedChannels.push(currentCh);
          }
          currentCh = null;
        }
      }
    }
    return parsedChannels;
  }

  // Get fallback text initials for channel logos
  function getBadgeInitials(name) {
    let clean = name.replace(/\|[A-Z]+\|/g, '').replace(/beIN Sports/gi, '').trim();
    if (!clean) return "📺";
    let words = clean.split(/\s+/).filter(w => w);
    if (words.length >= 2) {
      return (words[0][0] + (words[1] ? words[1][0] : '')).toUpperCase().substring(0, 3);
    }
    return clean.substring(0, 3).toUpperCase();
  }

  // Parse raw M3U text block
  const m3uRawText = document.getElementById('m3uData').textContent;
  const masterChannels = parseM3U(m3uRawText);

  const playlistEl   = document.getElementById('playlist');
  const video        = document.getElementById('videoPlayer');
  const frame        = document.getElementById('playerFrame');
  const loading      = document.getElementById('loadingOverlay');
  const title        = document.getElementById('channelTitle');
  const sidebar      = document.getElementById('sidebar');
  const backdrop     = document.getElementById('backdrop');
  const footerCount  = document.getElementById('footerCount');

  // Custom UI elements
  const playBtn      = document.getElementById('ytPlayBtn');
  const playIcon     = document.getElementById('playIcon');
  const pauseIcon    = document.getElementById('pauseIcon');
  const muteBtn      = document.getElementById('ytMuteBtn');
  const volumeUpIcon = document.getElementById('volumeUpIcon');
  const volumeOffIcon= document.getElementById('volumeOffIcon');
  const volumeSlider = document.getElementById('ytVolumeSlider');
  const ytReloadBtn  = document.getElementById('ytReloadBtn');
  const overlayFsBtn = document.getElementById('ytOverlayFullscreenBtn');

  let currentFilter = 'HD'; // Default filtered category on load
  
  // Find first channel matching default filter
  let activeChannelObj = masterChannels.find(ch => ch.quality === currentFilter) || masterChannels[0] || null;
  
  let hlsPlayer = null;
  let tsPlayer = null;

  function render() {
    playlistEl.innerHTML = '';
    
    // Filter channels based on filter setting (SD, HD, or 4K only)
    const filtered = masterChannels.filter(ch => ch.quality === currentFilter);

    filtered.forEach((ch) => {
      const el = document.createElement('div');
      const isActive = activeChannelObj && (activeChannelObj.url === ch.url);
      el.className = 'channel' + (isActive ? ' active' : '');
      
      const badgeText = getBadgeInitials(ch.name);

      el.innerHTML = `
        <div class="ch-badge">
          ${ch.logo ? `<img src="${ch.logo}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : ''}
          <span style="${ch.logo ? 'display:none;' : ''}">${badgeText}</span>
        </div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-sub">${ch.sub}</div>
        </div>
        <span class="quality-badge badge-${ch.quality.toLowerCase()}">${ch.quality}</span>
        <div class="live-dot"></div>`;
      
      el.addEventListener('click', () => pickChannel(ch));
      playlistEl.appendChild(el);
    });

    footerCount.textContent = `${filtered.length} MAX channels · Streaming live`;
  }

  function pickChannel(ch) {
    activeChannelObj = ch;
    render();
    loadStream(ch);
    if (window.innerWidth <= 860) closeSidebar();
  }

  function cleanPlayers() {
    if (hlsPlayer) {
      hlsPlayer.destroy();
      hlsPlayer = null;
    }
    if (tsPlayer) {
      tsPlayer.unload();
      tsPlayer.detachMediaElement();
      tsPlayer.destroy();
      tsPlayer = null;
    }
    video.src = '';
  }

  function loadStream(ch) {
    if (!ch) return;
    title.textContent = ch.name;
    loading.classList.remove('hidden');
    frame.classList.remove('show');

    cleanPlayers();

    const streamUrl = ch.url;

    // Detect if the stream URL is a raw Xtream Codes MPEG-TS link
    const isMpegTs = !streamUrl.includes('.m3u8') && 
                     (streamUrl.endsWith('.ts') || 
                      /:\d+\/[^/]+\/[^/]+\/\d+/.test(streamUrl) || 
                      /^\d+$/.test(streamUrl.split('/').pop()));

    if (isMpegTs) {
      // Use mpegts.js for raw .ts / MPEG-TS streams
      if (mpegts.getFeatureList().mseLivePlayback) {
        tsPlayer = mpegts.createPlayer({
          type: 'mpegts',
          isLive: true,
          url: streamUrl,
          cors: true
        }, {
          enableStashBuffer: false,
          liveBufferLatencyChaser: true
        });
        tsPlayer.attachMediaElement(video);
        tsPlayer.load();
        
        // Auto-play safely
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            // Mute and retry if standard auto-play is blocked by browser policy
            video.muted = true;
            video.play().catch(e => console.warn("Mpegts playback failed:", e));
          });
        }
      } else {
        // Direct stream URL fallback
        video.src = streamUrl;
        video.play().catch(e => console.warn("Direct stream allocation prevented:", e));
      }
    } else {
      // Use hls.js for standard HLS .m3u8 playlists
      if (Hls.isSupported()) {
        hlsPlayer = new Hls({
          enableWorker: true,
          lowLatencyMode: true
        });
        hlsPlayer.loadSource(streamUrl);
        hlsPlayer.attachMedia(video);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
          const playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.catch(() => {
              video.muted = true;
              video.play().catch(e => console.warn("Muted HLS playback fallback failed:", e));
            });
          }
        });
        hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                hlsPlayer.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                hlsPlayer.recoverMediaError();
                break;
              default:
                cleanPlayers();
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
        video.play().catch(e => console.warn("Native HLS Playback prevented:", e));
      } else {
        video.src = streamUrl;
        video.play().catch(e => console.warn("Generic Playback prevented:", e));
      }
    }
  }

  // Handle slide/quality segment filtering
  document.getElementById('qualityFilter').addEventListener('click', (e) => {
    const target = e.target.closest('.filter-btn');
    if (!target) return;

    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    target.classList.add('active');

    currentFilter = target.getAttribute('data-quality');
    render();
  });

  // Custom Controls logic implementation
  
  // Play & Pause Custom Controls
  function togglePlayState() {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  }

  playBtn.addEventListener('click', togglePlayState);
  video.addEventListener('click', togglePlayState); // Play/pause by clicking directly on video frame

  video.addEventListener('play', () => {
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
  });

  video.addEventListener('pause', () => {
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  });

  // Custom Volume & Mute control
  function updateVolumeUI() {
    if (video.muted || video.volume === 0) {
      volumeUpIcon.style.display = 'none';
      volumeOffIcon.style.display = 'block';
      volumeSlider.value = 0;
    } else {
      volumeUpIcon.style.display = 'block';
      volumeOffIcon.style.display = 'none';
      volumeSlider.value = video.volume;
    }
  }

  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    updateVolumeUI();
  });

  volumeSlider.addEventListener('input', (e) => {
    const targetVal = parseFloat(e.target.value);
    video.volume = targetVal;
    if (targetVal === 0) {
      video.muted = true;
    } else {
      video.muted = false;
    }
    updateVolumeUI();
  });

  video.addEventListener('volumechange', updateVolumeUI);

  // Fullscreen container handler
  function togglePlayerFullscreen() {
    const el = document.getElementById('playerFrame');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (el.requestFullscreen) {
        el.requestFullscreen();
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }
  }

  overlayFsBtn.addEventListener('click', togglePlayerFullscreen);
  document.getElementById('fullscreenBtn').addEventListener('click', togglePlayerFullscreen);
  ytReloadBtn.addEventListener('click', () => loadStream(activeChannelObj));

  // Loading indicator / frame visualization states
  video.addEventListener('playing', () => {
    loading.classList.add('hidden');
    frame.classList.add('show');
    updateVolumeUI();
  });

  video.addEventListener('waiting', () => {
    loading.classList.remove('hidden');
  });

  video.addEventListener('error', () => {
    loading.classList.add('hidden');
    frame.classList.add('show');
  });

  document.getElementById('reloadBtn').addEventListener('click', () => loadStream(activeChannelObj));

  function openSidebar()  { sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('show'); }

  document.getElementById('menuBtn').addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
  backdrop.addEventListener('click', closeSidebar);

  // Initialize
  render();
  if (activeChannelObj) {
    loadStream(activeChannelObj);
  }
</script>
<script src="ad-shield.js"></script>
<script src="tv-nav.js"></script>
</body>
</html>
