<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>CineFast</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --bg4: #22222f;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f5;
  --muted: rgba(240,240,245,0.5);
  --dim: rgba(240,240,245,0.28);
  --accent: #e8403a;
  --accent2: #ff6b44;
  --gold: #f5c842;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:0;padding:0 24px;height:58px;background:linear-gradient(to bottom,rgba(10,10,15,0.98),rgba(10,10,15,0.7));border-bottom:1px solid var(--border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.nav-logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--accent);margin-right:28px;flex-shrink:0;cursor:pointer;}
.nav-logo span{color:var(--text);}
.nav-tabs{display:flex;gap:2px;flex:1;}
.nav-tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.06);}
.nav-tab.active{color:var(--text);background:rgba(255,255,255,0.1);}
.nav-right{display:flex;gap:8px;align-items:center;margin-left:auto;}
.search-wrap{position:relative;}
#searchInput{width:220px;padding:8px 36px 8px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:all .2s;}
#searchInput::placeholder{color:var(--dim);}
#searchInput:focus{border-color:var(--accent);width:280px;background:var(--bg2);}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px;pointer-events:none;}
.icon-btn{width:36px;height:36px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
.icon-btn:hover{color:var(--text);background:var(--bg4);}

/* ── MAIN SCROLL ── */
#app{position:fixed;inset:0;top:58px;overflow-y:auto;overflow-x:hidden;background:var(--bg);}
#app::-webkit-scrollbar{width:5px;}
#app::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:5px;}

/* ── HERO ── */
#hero{position:relative;height:520px;display:flex;align-items:flex-end;padding:40px 40px 48px;overflow:hidden;flex-shrink:0;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(0.45);}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right, rgba(10,10,15,0.9) 40%, transparent 80%), linear-gradient(to top, rgba(10,10,15,1) 0%, transparent 60%);}
.hero-content{position:relative;z-index:1;max-width:560px;}
.hero-type{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
.hero-title{font-size:42px;font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:12px;}
.hero-meta{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.hero-rating{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--gold);font-weight:600;}
.hero-year{font-size:13px;color:var(--muted);}
.hero-genre{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;background:rgba(255,255,255,0.1);color:var(--muted);border:1px solid var(--border2);}
.hero-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:22px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hero-btns{display:flex;gap:10px;}
.btn-primary{display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:11px;background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-primary:hover{background:#f05050;transform:translateY(-1px);}
.btn-secondary{display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:11px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-secondary:hover{background:rgba(255,255,255,0.18);}

/* ── ROWS ── */
.section{padding:0 32px 10px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:16px;font-weight:600;letter-spacing:-0.2px;}
.section-more{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;}
.row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.row::-webkit-scrollbar{display:none;}
.card{flex-shrink:0;width:152px;cursor:pointer;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);transition:transform .2s,border-color .2s;position:relative;}
.card:hover{transform:scale(1.04);border-color:var(--border2);}
.card-wide{width:220px;}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg4);}
.card-wide .card-img{aspect-ratio:16/9;}
.card-info{padding:8px 10px 10px;}
.card-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.card-sub{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;}
.card-rating{color:var(--gold);font-weight:600;}
.card-badge{position:absolute;top:7px;left:7px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--accent);color:#fff;letter-spacing:0.3px;}
.card-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s;opacity:0;}
.card:hover .card-play{opacity:1;background:rgba(0,0,0,0.45);}
.card-play-btn{width:44px;height:44px;border-radius:50%;background:rgba(232,64,58,0.9);display:flex;align-items:center;justify-content:center;font-size:18px;}

/* ── SEARCH RESULTS ── */
#searchPage{display:none;padding:16px 32px 40px;}
#searchPage.visible{display:block;}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;}
.search-heading{font-size:14px;color:var(--muted);margin-bottom:16px;}

/* ── PLAYER OVERLAY ── */
#playerOverlay{position:fixed;inset:0;z-index:200;background:#000;display:none;flex-direction:column;}
#playerOverlay.open{display:flex;}
#playerTopbar{display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(10,10,15,0.9);flex-shrink:0;border-bottom:1px solid var(--border);}
#playerBack{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:6px;}
#playerTitle{font-size:15px;font-weight:600;flex:1;}
#playerMeta{font-size:12px;color:var(--muted);}
.player-ctrl-btn{width:36px;height:36px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
.player-ctrl-btn:hover{color:var(--text);background:var(--bg4);}
#playerFrame{flex:1;position:relative;}
#playerIframe{width:100%;height:100%;border:0;display:block;}

/* Episode selector (TV shows) */
#episodeBar{background:var(--bg2);border-top:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;max-height:220px;overflow:hidden;transition:max-height .3s ease;}
#episodeBar.open{display:flex;}
.ep-seasons-row{display:flex;gap:6px;padding:10px 18px 8px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;}
.ep-seasons-row::-webkit-scrollbar{display:none;}
.ep-episodes-row{display:flex;gap:6px;padding:10px 18px 12px;overflow-x:auto;flex:1;align-items:center;}
.ep-episodes-row::-webkit-scrollbar{height:4px;}
.ep-episodes-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
.ep-season-btn{padding:6px 14px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0;}
.ep-season-btn:hover{color:var(--text);border-color:var(--border2);}
.ep-season-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ep-btn{padding:6px 11px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .12s;flex-shrink:0;}
.ep-btn:hover{color:var(--text);border-color:var(--border2);}
.ep-btn.active{background:var(--bg4);border-color:var(--accent);color:var(--text);}
.ep-loading{color:var(--muted);font-size:12px;padding:4px 0;}

/* ── DETAIL PANEL ── */
#detailPanel{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;}
#detailPanel.open{display:flex;}
.detail-box{background:var(--bg2);border-radius:16px;border:1px solid var(--border2);width:min(680px,94vw);max-height:78vh;overflow-y:auto;position:relative;}
.detail-box::-webkit-scrollbar{width:4px;}
.detail-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
.detail-hero{position:relative;height:200px;border-radius:16px 16px 0 0;overflow:hidden;}
.detail-hero-bg{width:100%;height:100%;object-fit:cover;filter:brightness(0.55);display:block;}
.detail-hero-bg-div{width:100%;height:100%;background-size:cover;background-position:center;filter:brightness(0.55);}
.detail-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg2) 0%,transparent 60%);}
.detail-close{position:absolute;top:14px;right:14px;z-index:2;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid var(--border2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.detail-body{padding:16px 24px 22px;}
.detail-type{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px;}
.detail-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.detail-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.detail-meta-chip{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg4);color:var(--muted);border:1px solid var(--border);}
.detail-rating{font-size:12px;color:var(--gold);font-weight:600;}
.detail-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.detail-btns{display:flex;gap:10px;flex-wrap:wrap;}

/* ── DETAIL SEASON/EP PICKER ── */
#detailSeasons{display:none;margin-top:20px;border-top:1px solid var(--border);padding-top:18px;}
#detailSeasons.visible{display:block;}
.detail-seasons-label{font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
.detail-seasons-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none;}
.detail-seasons-row::-webkit-scrollbar{display:none;}
.detail-ep-label{font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.detail-ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:6px;max-height:148px;overflow-y:auto;padding-right:2px;}
.detail-ep-grid::-webkit-scrollbar{width:3px;}
.detail-ep-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.det-s-btn{padding:6px 14px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0;}
.det-s-btn:hover{color:var(--text);border-color:var(--border2);}
.det-s-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.det-e-btn{padding:8px 6px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.det-e-btn:hover{color:var(--text);border-color:var(--border2);}
.det-e-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.detail-seasons-loading{font-size:12px;color:var(--muted);padding:8px 0;}

/* ── LOADING SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{flex-shrink:0;width:152px;border-radius:10px;overflow:hidden;}
.skel-img{width:100%;aspect-ratio:2/3;}
.skel-title{height:12px;margin:8px 10px 4px;width:80%;}
.skel-sub{height:10px;margin:0 10px 10px;width:50%;}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ── MOBILE SEARCH BAR ── */
#mobileSearchBar{display:none;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);position:fixed;top:52px;left:0;right:0;z-index:99;}
#mobileSearchInput{width:100%;padding:9px 36px 9px 14px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:16px;font-family:inherit;outline:none;}
#mobileSearchInput::placeholder{color:var(--dim);}
#mobileSearchInput:focus{border-color:var(--accent);}
.mobile-search-wrap{position:relative;}
.mobile-search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px;pointer-events:none;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  /* Nav: logo + tabs only, hide desktop search */
  #nav{padding:0 10px;gap:0;height:52px;}
  .nav-logo{font-size:17px;margin-right:12px;}
  .nav-tabs{flex:1;gap:0;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nav-tab{padding:6px 10px;font-size:12px;}
  /* Hide desktop search & fullscreen btn on mobile */
  .nav-right{display:none;}
  /* Show mobile search bar below nav */
  #mobileSearchBar{display:block;}
  /* Shift app top to account for search bar (~48px) */
  #app{top:100px;}
  #hero{height:380px;padding:20px 16px 32px;}
  .hero-title{font-size:26px;}
  .hero-desc{-webkit-line-clamp:2;}
  .hero-btns{gap:8px;}
  .btn-primary,.btn-secondary{padding:9px 16px;font-size:13px;}
  .section{padding:0 12px 10px;}
  #searchPage{padding:12px 12px 32px;}
  .detail-body{padding:14px 16px 20px;}
  .detail-title{font-size:20px;}
  .search-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
  /* Row cards slightly smaller on mobile */
  .card{width:130px;}
  .card-wide{width:200px;}
}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo" onclick="goHome()">Cine<span>Fast</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab(this,'home')">Home</button>
    <button class="nav-tab" onclick="setTab(this,'movies')">Movies</button>
    <button class="nav-tab" onclick="setTab(this,'series')">Series</button>
    <button class="nav-tab" onclick="setTab(this,'trending')">Trending</button>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <input id="searchInput" placeholder="Search movies, series…" autocomplete="off" oninput="onSearch(this.value)">
      <span class="search-icon">🔍</span>
    </div>
    <button class="icon-btn" title="Fullscreen" onclick="goFullscreen()">⛶</button>
  </div>
</nav>

<!-- Mobile search bar (shown only on phones) -->
<div id="mobileSearchBar">
  <div class="mobile-search-wrap">
    <input id="mobileSearchInput" placeholder="Search movies, series…" autocomplete="off" oninput="onSearch(this.value)">
    <span class="mobile-search-icon">🔍</span>
  </div>
</div>

<div id="app">
  <div id="homePage">
    <div id="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-content">
        <div class="hero-type" id="heroType">Featured Film</div>
        <div class="hero-title" id="heroTitle">Loading…</div>
        <div class="hero-meta" id="heroMeta"></div>
        <div class="hero-desc" id="heroDesc"></div>
        <div class="hero-btns">
          <button class="btn-primary" id="heroPlay" onclick="playHero()">▶ Watch Now</button>
          <button class="btn-secondary" id="heroInfo" onclick="infoHero()">ℹ More Info</button>
        </div>
      </div>
    </div>
    <div id="homeRows"></div>
  </div>
  <div id="searchPage">
    <div class="search-heading" id="searchHeading"></div>
    <div class="search-grid" id="searchGrid"></div>
  </div>
</div>

<!-- Detail Panel -->
<div id="detailPanel" onclick="closeDetail(event)">
  <div class="detail-box" id="detailBox">
    <div class="detail-hero">
      <div class="detail-hero-bg-div" id="detailBg"></div>
      <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-type" id="detailType"></div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-desc" id="detailDesc"></div>

      <!-- Season/Episode picker (TV only) -->
      <div id="detailSeasons">
        <div class="detail-seasons-label">Season</div>
        <div class="detail-seasons-row" id="detailSeasonsRow"><div class="detail-seasons-loading">Loading…</div></div>
        <div class="detail-ep-label">Episode</div>
        <div class="detail-ep-grid" id="detailEpGrid"></div>
      </div>

      <div class="detail-btns" style="margin-top:20px;">
        <button class="btn-primary" id="detailWatchBtn" onclick="playFromDetail()">▶ Watch Now</button>
        <button class="btn-secondary" onclick="closeDetailBtn()">✕ Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Player Overlay -->
<div id="playerOverlay">
  <div id="playerTopbar">
    <button id="playerBack" onclick="closePlayer()">← Back</button>
    <div id="playerTitle">Loading…</div>
    <div id="playerMeta"></div>
    <button class="player-ctrl-btn" title="Reload" onclick="reloadPlayer()">⟳</button>
    <button class="player-ctrl-btn" title="Fullscreen" onclick="goFullscreen()">⛶</button>
  </div>
  <div id="playerFrame">
    <iframe id="playerIframe" allowfullscreen webkit-allowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      referrerpolicy="no-referrer" src="about:blank"></iframe>
  </div>
  <div id="episodeBar">
    <div class="ep-seasons-row" id="seasonsRow"></div>
    <div class="ep-episodes-row" id="episodesRow"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── CONFIG ── */
const TMDB_KEY = '4ef0d7355d9ffb5151e987764708ce96'; // free public demo key
const TMDB   = 'https://api.themoviedb.org/3';
const IMG_W   = 'https://image.tmdb.org/t/p/w342';
const IMG_B   = 'https://image.tmdb.org/t/p/w1280';
const EMBED_M = id => `https://vidfast.pro/movie/${id}?autoPlay=true`;
const EMBED_T = (id, s, e) => `https://vidfast.pro/tv/${id}/${s}/${e}?autoPlay=true`;

/* ── STATE ── */
let _heroItem = null;
let _detailItem = null;
let _currentTab = 'home';
let _searchTimer = null;
let _currentSeason = 1;
let _currentEpisode = 1;
let _tvSeasons = [];
let _guard = true;

/* ── AD BLOCK ── */
window.open = url => { console.warn('[cinefast] blocked popup:', url); return null; };
document.addEventListener('auxclick', e => { if(e.button===1 && e.target.tagName!=='IFRAME'){e.preventDefault();e.stopImmediatePropagation();} }, true);

function installShield(iframe) { /* shield removed – was blocking player controls */ }

/* ── API ── */
async function tmdb(path, params={}) {
  const u = new URL(TMDB + path);
  u.searchParams.set('api_key', TMDB_KEY);
  u.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k,v]) => u.searchParams.set(k,v));
  const r = await fetch(u); return r.json();
}

/* ── HELPERS ── */
function stars(v) { return '★ ' + (v||0).toFixed(1); }
function year(d)  { return d ? d.slice(0,4) : ''; }
function mediaType(item) { return item.media_type || (item.first_air_date ? 'tv' : 'movie'); }
function poster(p) { return p ? IMG_W + p : ''; }
function backdrop(b) { return b ? IMG_B + b : ''; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── CARD BUILDER ── */
function buildCard(item, wide=false) {
  const type = mediaType(item);
  const title = item.title || item.name || '';
  const yr = year(item.release_date || item.first_air_date);
  const img = wide ? backdrop(item.backdrop_path) : poster(item.poster_path);
  const d = document.createElement('div');
  d.className = 'card' + (wide ? ' card-wide' : '');
  d.innerHTML = `
    ${img ? `<img class="card-img" src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : `<div class="card-img skeleton"></div>`}
    ${type==='tv'?'<div class="card-badge">SERIES</div>':''}
    <div class="card-play"><div class="card-play-btn">▶</div></div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-sub"><span class="card-rating">${stars(item.vote_average)}</span><span>${yr}</span></div>
    </div>`;
  d.addEventListener('click', () => openDetail(item));
  return d;
}

function buildSkeletons(n, wide=false) {
  return Array.from({length:n}, () => {
    const d = document.createElement('div');
    d.className = 'skel-card' + (wide?' card-wide':'');
    d.innerHTML = `<div class="skeleton skel-img" style="${wide?'aspect-ratio:16/9':'aspect-ratio:2/3'}"></div><div class="skeleton skel-title"></div><div class="skeleton skel-sub"></div>`;
    return d;
  });
}

function buildRow(title, items, wide=false) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="section-header"><div class="section-title">${title}</div></div>`;
  const row = document.createElement('div');
  row.className = 'row';
  items.forEach(item => row.appendChild(buildCard(item, wide)));
  sec.appendChild(row);
  return sec;
}

function buildSkeletonRow(title, n=8, wide=false) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="section-header"><div class="section-title">${title}</div></div>`;
  const row = document.createElement('div');
  row.className = 'row';
  buildSkeletons(n, wide).forEach(s => row.appendChild(s));
  sec.appendChild(row);
  return sec;
}

/* ── HERO ── */
function setHero(item) {
  _heroItem = item;
  const type = mediaType(item);
  const title = item.title || item.name || '';
  const yr = year(item.release_date || item.first_air_date);
  const genres = (item.genre_ids||[]).slice(0,2).map(g => GENRE_MAP[g]).filter(Boolean);
  document.getElementById('heroBg').style.backgroundImage = `url(${backdrop(item.backdrop_path)})`;
  document.getElementById('heroType').textContent = type==='tv' ? 'Featured Series' : 'Featured Film';
  document.getElementById('heroTitle').textContent = title;
  document.getElementById('heroDesc').textContent = item.overview || '';
  document.getElementById('heroMeta').innerHTML =
    `<span class="hero-rating">★ ${(item.vote_average||0).toFixed(1)}</span>
     <span class="hero-year">${yr}</span>
     ${genres.map(g=>`<span class="hero-genre">${g}</span>`).join('')}`;
}

/* ── TABS ── */
function setTab(btn, tab) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _currentTab = tab;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchPage').classList.remove('visible');
  document.getElementById('homePage').style.display = '';
  loadTab(tab);
}

async function loadTab(tab) {
  const rows = document.getElementById('homeRows');
  rows.innerHTML = '';
  if(tab==='home') { loadHome(); return; }
  const configs = {
    movies: [
      {title:'Now Playing', path:'/movie/now_playing'},
      {title:'Popular Movies', path:'/movie/popular'},
      {title:'Top Rated', path:'/movie/top_rated'},
      {title:'Upcoming', path:'/movie/upcoming'},
    ],
    series: [
      {title:'Airing Today', path:'/tv/airing_today'},
      {title:'Popular Series', path:'/tv/popular'},
      {title:'Top Rated Series', path:'/tv/top_rated'},
      {title:'On The Air', path:'/tv/on_the_air'},
    ],
    trending: [
      {title:'Trending Today', path:'/trending/all/day'},
      {title:'Trending This Week', path:'/trending/all/week'},
    ],
  };
  const list = configs[tab] || [];
  list.forEach(cfg => rows.appendChild(buildSkeletonRow(cfg.title)));
  const rowEls = rows.querySelectorAll('.section');
  for(let i=0; i<list.length; i++){
    const data = await tmdb(list[i].path);
    const items = (data.results||[]).slice(0,16);
    const row = rowEls[i].querySelector('.row');
    row.innerHTML = '';
    items.forEach(item => row.appendChild(buildCard(item)));
    if(i===0 && items.length) setHero(items[Math.floor(Math.random()*Math.min(5,items.length))]);
  }
}

async function loadHome() {
  const rows = document.getElementById('homeRows');
  const placeholders = [
    'Trending Now', 'Popular Movies', 'Top Series', 'New Releases', 'Top Rated'
  ];
  placeholders.forEach((t,i) => rows.appendChild(buildSkeletonRow(t, 8, i===1)));
  const [trending, movies, tv, newM, topM] = await Promise.all([
    tmdb('/trending/all/day'),
    tmdb('/movie/popular'),
    tmdb('/tv/popular'),
    tmdb('/movie/now_playing'),
    tmdb('/movie/top_rated'),
  ]);
  const hero = (trending.results||[])[Math.floor(Math.random()*5)];
  if(hero) setHero(hero);
  const rowData = [
    {title:'Trending Now', items:trending.results||[], wide:false},
    {title:'Popular Movies', items:movies.results||[], wide:true},
    {title:'Popular Series', items:tv.results||[], wide:false},
    {title:'New in Cinemas', items:newM.results||[], wide:false},
    {title:'Top Rated Films', items:topM.results||[], wide:false},
  ];
  const rowEls = rows.querySelectorAll('.section');
  rowData.forEach((rd,i) => {
    const row = rowEls[i].querySelector('.row');
    rowEls[i].querySelector('.section-title').textContent = rd.title;
    row.innerHTML = '';
    rd.items.slice(0,16).forEach(item => row.appendChild(buildCard(item, rd.wide)));
  });
}

function goHome() {
  document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', i===0));
  _currentTab = 'home';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchPage').classList.remove('visible');
  document.getElementById('homePage').style.display = '';
  loadHome();
}

/* ── SEARCH ── */
function onSearch(q) {
  clearTimeout(_searchTimer);
  if(!q.trim()) {
    document.getElementById('searchPage').classList.remove('visible');
    document.getElementById('homePage').style.display = '';
    return;
  }
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('searchPage').classList.add('visible');
  document.getElementById('searchHeading').textContent = `Searching for "${q}"…`;
  document.getElementById('searchGrid').innerHTML = '';
  _searchTimer = setTimeout(() => doSearch(q), 420);
}

async function doSearch(q) {
  const data = await tmdb('/search/multi', {query:q});
  const items = (data.results||[]).filter(r => r.media_type!=='person' && (r.poster_path||r.backdrop_path));
  document.getElementById('searchHeading').textContent = items.length ? `Results for "${q}"` : `No results for "${q}"`;
  const grid = document.getElementById('searchGrid');
  grid.innerHTML = '';
  items.forEach(item => grid.appendChild(buildCard(item)));
}

/* ── DETAIL ── */
let _detailSeason = 1;
let _detailEpisode = 1;
let _detailSeasons = [];

async function openDetail(item) {
  _detailItem = item;
  _detailSeason = 1;
  _detailEpisode = 1;
  _detailSeasons = [];
  const type = mediaType(item);
  const title = item.title || item.name || '';
  const yr = year(item.release_date || item.first_air_date);
  document.getElementById('detailType').textContent = type==='tv' ? 'TV Series' : 'Movie';
  document.getElementById('detailTitle').textContent = title;
  document.getElementById('detailDesc').textContent = item.overview || 'No description available.';
  document.getElementById('detailBg').style.backgroundImage = `url(${backdrop(item.backdrop_path)||poster(item.poster_path)})`;
  document.getElementById('detailMeta').innerHTML = `
    <span class="detail-meta-chip detail-rating">★ ${(item.vote_average||0).toFixed(1)}</span>
    ${yr ? `<span class="detail-meta-chip">${yr}</span>` : ''}
    <span class="detail-meta-chip">${type==='tv'?'Series':'Movie'}</span>`;

  const seasonsEl = document.getElementById('detailSeasons');
  const watchBtn = document.getElementById('detailWatchBtn');

  if(type === 'tv') {
    seasonsEl.classList.add('visible');
    watchBtn.textContent = '▶ Watch S1 E1';
    document.getElementById('detailSeasonsRow').innerHTML = '<div class="detail-seasons-loading">Loading seasons…</div>';
    document.getElementById('detailEpGrid').innerHTML = '';
    document.getElementById('detailPanel').classList.add('open');
    // fetch seasons async
    try {
      const data = await tmdb(`/tv/${item.id}`);
      _detailSeasons = (data.seasons||[]).filter(s => s.season_number > 0);
      renderDetailSeasons(item.id);
    } catch(e) {
      document.getElementById('detailSeasonsRow').innerHTML = '<div class="detail-seasons-loading">Could not load seasons.</div>';
    }
  } else {
    seasonsEl.classList.remove('visible');
    watchBtn.textContent = '▶ Watch Now';
    document.getElementById('detailPanel').classList.add('open');
  }
}

function renderDetailSeasons(tvId) {
  const row = document.getElementById('detailSeasonsRow');
  row.innerHTML = '';
  _detailSeasons.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'det-s-btn' + (s.season_number === _detailSeason ? ' active' : '');
    btn.textContent = `Season ${s.season_number}`;
    btn.onclick = () => {
      _detailSeason = s.season_number;
      _detailEpisode = 1;
      row.querySelectorAll('.det-s-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDetailEpisodes(s);
    };
    row.appendChild(btn);
  });
  const first = _detailSeasons.find(s => s.season_number === 1) || _detailSeasons[0];
  if(first) renderDetailEpisodes(first);
}

function renderDetailEpisodes(season) {
  const grid = document.getElementById('detailEpGrid');
  grid.innerHTML = '';
  const count = season.episode_count || 1;
  for(let ep = 1; ep <= count; ep++) {
    const btn = document.createElement('button');
    btn.className = 'det-e-btn' + (ep === _detailEpisode ? ' active' : '');
    btn.textContent = `E${ep}`;
    btn.onclick = () => {
      _detailEpisode = ep;
      grid.querySelectorAll('.det-e-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('detailWatchBtn').textContent = `▶ Watch S${_detailSeason} E${ep}`;
    };
    grid.appendChild(btn);
  }
  document.getElementById('detailWatchBtn').textContent = `▶ Watch S${_detailSeason} E1`;
}

function closeDetail(e) {
  if(e.target===document.getElementById('detailPanel')) closeDetailBtn();
}
function closeDetailBtn() {
  document.getElementById('detailPanel').classList.remove('open');
}

function playFromDetail() {
  if(!_detailItem) return;
  closeDetailBtn();
  const type = mediaType(_detailItem);
  if(type === 'tv') {
    // pre-set the player state to the chosen season/episode
    _currentSeason = _detailSeason;
    _currentEpisode = _detailEpisode;
  }
  startPlay(_detailItem);
}

function playHero() { if(_heroItem) startPlay(_heroItem); }
function infoHero() { if(_heroItem) openDetail(_heroItem); }

/* ── PLAYER ── */
async function startPlay(item) {
  const type = mediaType(item);
  const title = item.title || item.name || '';
  _guard = false;
  setTimeout(() => { _guard = true; }, 200);

  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerMeta').textContent = type==='tv' ? 'Select episode below' : '';
  document.getElementById('playerOverlay').classList.add('open');

  if(type === 'tv') {
    document.getElementById('episodeBar').classList.add('open');
    await loadSeasons(item.id);
    loadEpisode(item.id, _currentSeason, _currentEpisode);
  } else {
    document.getElementById('episodeBar').classList.remove('open');
    setIframeSrc(EMBED_M(item.id));
    document.getElementById('playerMeta').textContent = year(item.release_date);
  }
}

async function loadSeasons(tvId) {
  const bar = document.getElementById('episodeBar');
  const seasonsRow = document.getElementById('seasonsRow');
  const episodesRow = document.getElementById('episodesRow');
  seasonsRow.innerHTML = '<div class="ep-loading">Loading seasons…</div>';
  episodesRow.innerHTML = '';
  try {
    const data = await tmdb(`/tv/${tvId}`);
    _tvSeasons = (data.seasons||[]).filter(s => s.season_number > 0);
    renderSeasonBar(tvId);
  } catch(e) {
    seasonsRow.innerHTML = '<div class="ep-loading">Could not load seasons</div>';
  }
}

function renderSeasonBar(tvId) {
  const seasonsRow = document.getElementById('seasonsRow');
  seasonsRow.innerHTML = '';
  _tvSeasons.forEach(season => {
    const btn = document.createElement('button');
    btn.className = 'ep-season-btn' + (season.season_number===_currentSeason?' active':'');
    btn.textContent = `Season ${season.season_number}`;
    btn.onclick = () => {
      _currentSeason = season.season_number;
      _currentEpisode = 1;
      seasonsRow.querySelectorAll('.ep-season-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderEpisodeButtons(tvId, season);
    };
    seasonsRow.appendChild(btn);
  });
  const firstSeason = _tvSeasons.find(s => s.season_number===_currentSeason) || _tvSeasons[0];
  if(firstSeason) renderEpisodeButtons(tvId, firstSeason);
}

function renderEpisodeButtons(tvId, season) {
  const episodesRow = document.getElementById('episodesRow');
  episodesRow.innerHTML = '';
  const count = season.episode_count || 1;
  for(let ep=1; ep<=count; ep++){
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (ep===_currentEpisode?' active':'');
    btn.textContent = `E${ep}`;
    btn.onclick = () => {
      _currentEpisode = ep;
      episodesRow.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadEpisode(tvId, _currentSeason, ep);
    };
    episodesRow.appendChild(btn);
  }
}

function loadEpisode(tvId, season, ep) {
  document.getElementById('playerMeta').textContent = `S${season} E${ep}`;
  setIframeSrc(EMBED_T(tvId, season, ep));
}

function setIframeSrc(url) {
  const old = document.getElementById('playerIframe');
  const ni = document.createElement('iframe');
  ni.id = 'playerIframe';
  ni.allowFullscreen = true;
  ni.setAttribute('webkit-allowfullscreen','');
  ni.setAttribute('allow','autoplay; fullscreen; encrypted-media; picture-in-picture');
  ni.setAttribute('referrerpolicy','no-referrer');
  ni.style.cssText = 'width:100%;height:100%;border:0;display:block;';
  old.replaceWith(ni);
  ni.src = url;
  setTimeout(() => installShield(ni), 100);
}

function closePlayer() {
  _guard = false;
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('episodeBar').classList.remove('open');
  setIframeSrc('about:blank');
  _currentSeason = 1; _currentEpisode = 1;
  setTimeout(() => { _guard = true; }, 500);
}

function reloadPlayer() {
  const iframe = document.getElementById('playerIframe');
  if(iframe && iframe.src && iframe.src!=='about:blank') {
    const src = iframe.src; iframe.src='about:blank';
    setTimeout(() => { iframe.src=src; }, 100);
  }
}

function goFullscreen() {
  const el = document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

/* ── MOBILE SEARCH SYNC ── */
// Keep mobile and desktop search inputs in sync
(function() {
  const mob = document.getElementById('mobileSearchInput');
  const desk = document.getElementById('searchInput');
  if(mob) {
    mob.addEventListener('input', function() {
      if(desk) desk.value = this.value;
      onSearch(this.value);
    });
  }
  if(desk) {
    desk.addEventListener('input', function() {
      if(mob) mob.value = this.value;
    });
  }
})();

/* ── TOUCH SWIPE FOR ROWS ── */
(function() {
  function addSwipe(el) {
    let startX = 0, startY = 0, startScroll = 0, isScrolling = false, decided = false;

    el.addEventListener('touchstart', function(e) {
      if(e.touches.length > 1) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startScroll = el.scrollLeft;
      isScrolling = false;
      decided = false;
    }, { passive: true });

    el.addEventListener('touchmove', function(e) {
      if(e.touches.length > 1) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if(!decided) {
        decided = true;
        // if more horizontal than vertical, lock to horizontal
        isScrolling = Math.abs(dx) > Math.abs(dy);
      }
      if(isScrolling) {
        e.preventDefault();
        el.scrollLeft = startScroll - dx;
      }
    }, { passive: false });
  }

  // Apply to all existing and future rows
  function attachToRows() {
    document.querySelectorAll('.row').forEach(function(row) {
      if(!row._swipeAttached) {
        row._swipeAttached = true;
        addSwipe(row);
      }
    });
  }

  // Observe DOM for new rows added dynamically
  const obs = new MutationObserver(attachToRows);
  obs.observe(document.getElementById('homeRows') || document.body, { childList: true, subtree: true });
  attachToRows();
})();
